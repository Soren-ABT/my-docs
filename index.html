<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到Soren的知识库</title>
    <style>
        :root {
            --bg: #f0ede8; --bg2: #e8e4df;
            --text: #2c2c2c; --sub: #666;
            --btn-border: #999; --btn-text: #2c2c2c;
            --btn-primary-bg: #2c2c2c; --btn-primary-text: #fff;
            --dot-color: rgba(0,0,0,0.2);
            --grid-color: rgba(0,0,0,0.03);
        }
        body.night {
            --bg: #0a0a18; --bg2: #0d0d22;
            --text: #e0e0e0; --sub: #999;
            --btn-border: #555; --btn-text: #e0e0e0;
            --btn-primary-bg: #5b8cce; --btn-primary-text: #fff;
            --dot-color: rgba(255,255,255,0.25);
            --grid-color: rgba(255,255,255,0.02);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, var(--bg), var(--bg2));
            color: var(--text); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            overflow: hidden; user-select: none;
            transition: background 0.8s, color 0.8s;
        }
        body::before {
            content:""; position:fixed; inset:0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index:0;
        }
        #bg-canvas { position:fixed; inset:0; z-index:1; pointer-events:none; }
        .content { position:relative; z-index:3; animation: fadeInUp 0.8s ease-out; }
        h1 { font-size:3rem; font-weight:700; letter-spacing:3px; margin-bottom:0.4rem; color:var(--text); }
        h1 span { display:inline-block; opacity:0; transform:translateY(30px); animation:letterRise 0.6s ease forwards; }
        .subtitle { font-size:1.1rem; color:var(--sub); margin:0.8rem auto 2.2rem; opacity:0; transform:translateY(20px); animation:fadeInUp 0.8s 0.3s ease forwards; }
        .buttons { opacity:0; transform:translateY(20px); animation:fadeInUp 0.8s 0.5s ease forwards; }
        .btn { display:inline-block; padding:0.7rem 2rem; margin:0.4rem; border-radius:4px; font-size:0.95rem; font-weight:500; text-decoration:none; transition:all 0.3s; border:1.5px solid var(--btn-border); color:var(--btn-text); background:transparent; letter-spacing:0.5px; position:relative; z-index:4; cursor:pointer; }
        .btn-primary { background:var(--btn-primary-bg); color:var(--btn-primary-text); border-color:var(--btn-primary-bg); font-weight:600; }
        .btn:hover { transform:translateY(-3px); box-shadow:0 12px 28px rgba(0,0,0,0.12); }
        .scroll-hint { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); z-index:3; display:flex; gap:8px; }
        .dot { width:8px; height:8px; background:var(--dot-color); border-radius:50%; animation:dotBounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
        .mode-toggle { position:fixed; top:20px; right:20px; z-index:10; width:42px; height:42px; border-radius:50%; background:rgba(128,128,128,0.12); backdrop-filter:blur(8px); border:1px solid rgba(128,128,128,0.2); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.4s; color:var(--text); }
        .mode-toggle:hover { background:rgba(128,128,128,0.25); }
        .mode-toggle svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; }
        body:not(.night) .mode-toggle .moon { display:none; }
        body.night .mode-toggle .sun { display:none; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes letterRise { to{opacity:1;transform:translateY(0)} }
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1.2);opacity:1} }
        @media(max-width:600px){ h1{font-size:1.8rem;letter-spacing:1px} .subtitle{font-size:0.9rem} .btn{padding:0.5rem 1.3rem;font-size:0.85rem} }
    </style>
</head>
<body>

<button class="mode-toggle" id="modeToggle" title="切换昼夜">
    <svg class="sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<canvas id="bg-canvas"></canvas>

<div class="content">
    <h1 id="cover-title">Soren的知识库</h1>
    <div class="subtitle" id="greeting">记录思考 · 沉淀技术 · 无限突破</div>
    <div class="buttons">
        <a href="javascript:void(0)" class="btn btn-primary" onclick="goToDocs()">开始阅读</a>
        <a href="https://github.com/Soren-ABT" class="btn" target="_blank" rel="noopener">GitHub</a>
    </div>
</div>

<div class="scroll-hint"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 60);
camera.position.set(0, 0.3, 9);

// ========== 昼夜状态 ==========
let isNight = (new Date().getHours() < 6 || new Date().getHours() >= 18);
if (isNight) document.body.classList.add('night');

// ========== 颜色配置 ==========
function colors() { return isNight
  ? { face: 0x1a2a3a, edge: 0x6688bb, orbit: 0x334466, accent: 0x8899cc }
  : { face: 0xe8e4df, edge: 0x444444, orbit: 0xc0bcb5, accent: 0x777777 };
}

// ========== 辅助：创建 EdgesGeometry 线框几何体 ==========
function createWireGeo(geometry, edgeColor) {
  const edgesGeo = new THREE.EdgesGeometry(geometry, 15);
  const mat = new THREE.LineBasicMaterial({ color: edgeColor, linewidth: 1, transparent: true, opacity: 0.85 });
  return new THREE.LineSegments(edgesGeo, mat);
}

// ========== 辅助：创建半透明白膜面 ==========
function createGhostMesh(geometry, faceColor) {
  const mat = new THREE.MeshBasicMaterial({ color: faceColor, transparent: true, opacity: 0.3, depthWrite: false });
  return new THREE.Mesh(geometry, mat);
}

// ========== 构建场景 ==========
const mainGroup = new THREE.Group();
scene.add(mainGroup);

// 各轨道倾斜角
const orbits = [
  { tiltX: 0.35, tiltY: 0.1,  radius: 2.2, speed: 0.35, geo: new THREE.OctahedronGeometry(0.25, 0) },
  { tiltX: -0.25, tiltY: -0.3, radius: 2.9, speed: -0.28, geo: new THREE.TetrahedronGeometry(0.22, 0) },
  { tiltX: 0.5, tiltY: -0.15, radius: 3.6, speed: 0.22, geo: new THREE.DodecahedronGeometry(0.2, 0) },
];

// 轨道环 + 卫星
const satellites = [];
const orbitLines = [];
const c = colors();

orbits.forEach((o, idx) => {
  // 轨道环
  const torusGeo = new THREE.TorusGeometry(o.radius, 0.015, 16, 140);
  const torusMat = new THREE.MeshBasicMaterial({ color: c.orbit, transparent: true, opacity: 0.55, depthWrite: false });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  torus.rotation.x = Math.PI / 2 + o.tiltX;
  torus.rotation.y = o.tiltY;
  mainGroup.add(torus);
  orbitLines.push({ mesh: torus, rx: Math.PI/2 + o.tiltX, ry: o.tiltY });

  // 卫星
  const ghost = createGhostMesh(o.geo, c.face);
  const wire = createWireGeo(o.geo, c.edge);
  const satGroup = new THREE.Group();
  satGroup.add(ghost);
  satGroup.add(wire);
  satGroup.position.set(o.radius, 0, 0);
  mainGroup.add(satGroup);
  satellites.push({ group: satGroup, radius: o.radius, speed: o.speed, angle: Math.random() * Math.PI * 2, rx: o.tiltX, ry: o.tiltY });
});

// 中心二十面体
const centerIcoGeo = new THREE.IcosahedronGeometry(0.6, 0);
const centerGhost = createGhostMesh(centerIcoGeo, c.face);
const centerWire = createWireGeo(centerIcoGeo, c.edge);
const centerGroup = new THREE.Group();
centerGroup.add(centerGhost);
centerGroup.add(centerWire);
mainGroup.add(centerGroup);

// 第二层中心小八面体（反向旋转）
const innerOctaGeo = new THREE.OctahedronGeometry(0.28, 0);
const innerGhost = createGhostMesh(innerOctaGeo, c.face);
const innerWire = createWireGeo(innerOctaGeo, c.edge);
const innerGroup = new THREE.Group();
innerGroup.add(innerGhost);
innerGroup.add(innerWire);
innerGroup.position.set(0, 0, 0);
mainGroup.add(innerGroup);

// 散落小几何体（背景粒子感）
const strayParticles = [];
for (let i = 0; i < 30; i++) {
  const g = Math.random() < 0.5
    ? new THREE.TetrahedronGeometry(0.06 + Math.random() * 0.08, 0)
    : new THREE.OctahedronGeometry(0.05 + Math.random() * 0.07, 0);
  const w = createWireGeo(g, c.orbit);
  w.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*8, (Math.random()-0.5)*7 - 2);
  strayParticles.push({ mesh: w, rotSpeed: (Math.random()-0.5)*0.02, floatSpeed: 0.003 + Math.random()*0.006, floatAmp: 0.3 + Math.random()*0.6, initY: w.position.y, phase: Math.random()*Math.PI*2 });
  scene.add(w);
}

// ========== 鼠标追踪 ==========
let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
document.addEventListener('mousemove', (e) => { targetX = (e.clientX/window.innerWidth)*2-1; targetY = -(e.clientY/window.innerHeight)*2+1; });

// ========== 动画循环 ==========
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  mouseX += (targetX - mouseX) * 3 * dt;
  mouseY += (targetY - mouseY) * 3 * dt;

  // 中心几何体自转
  centerGroup.rotation.x += 0.003;
  centerGroup.rotation.y += 0.005;
  innerGroup.rotation.x -= 0.004;
  innerGroup.rotation.y -= 0.006;

  // 卫星公转
  satellites.forEach(s => {
    s.angle += s.speed * dt;
    s.group.position.x = Math.cos(s.angle) * s.radius;
    s.group.position.y = Math.sin(s.angle) * s.radius * Math.sin(s.rx);
    s.group.position.z = Math.sin(s.angle) * s.radius * Math.cos(s.rx);
    s.group.rotation.x += 0.01;
    s.group.rotation.y += 0.015;
  });

  // 散落粒子微动
  strayParticles.forEach(p => {
    p.mesh.rotation.x += p.rotSpeed;
    p.mesh.rotation.y += p.rotSpeed * 0.7;
    p.mesh.position.y = p.initY + Math.sin(t * p.floatSpeed * 10 + p.phase) * p.floatAmp;
  });

  // 相机微随鼠标
  camera.position.x += (mouseX * 1.0 - camera.position.x) * 2 * dt;
  camera.position.y += (-mouseY * 0.6 + 0.3 - camera.position.y) * 2 * dt;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

// ========== 响应式 ==========
window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

// ========== 昼夜切换 ==========
window.toggleDayNight = function() {
  isNight = !isNight;
  document.body.classList.toggle('night', isNight);
  const nc = colors();
  // 更新中心
  [centerGhost, innerGhost].forEach(m => { m.material.color.set(nc.face); });
  [centerWire, innerWire].forEach(m => { m.material.color.set(nc.edge); });
  // 更新卫星
  satellites.forEach(s => {
    s.group.children.forEach(ch => {
      if (ch.isMesh && ch.material.opacity !== undefined && ch.material.opacity < 0.5) ch.material.color.set(nc.face);
      if (ch.isLineSegments) ch.material.color.set(nc.edge);
    });
  });
  // 更新轨道
  orbitLines.forEach(o => { o.mesh.material.color.set(nc.orbit); });
  // 更新散落
  strayParticles.forEach(p => { p.mesh.material.color.set(nc.orbit); });
};
document.getElementById('modeToggle').addEventListener('click', toggleDayNight);
</script>

<!-- ========== 原有文字逻辑 ========== -->
<script>
(function() {
  var hour = new Date().getHours(), base = '记录思考 · 沉淀技术 · 无限突破';
  if (hour < 6) base = '夜深了，' + base;
  else if (hour < 12) base = '上午好，' + base;
  else if (hour < 18) base = '下午好，' + base;
  else base = '晚上好，' + base;
  var el = document.getElementById('greeting'); if (el) el.textContent = base;
})();
(function() {
  var t = document.getElementById('cover-title'); if (!t) return;
  var txt = t.textContent.trim(), h = '';
  for (var i = 0; i < txt.length; i++) h += '<span style="animation-delay:'+(i*0.05)+'s">'+(txt[i]===' '?'&nbsp;':txt[i])+'</span>';
  t.innerHTML = h;
})();
function goToDocs() { document.body.style.opacity='0'; document.body.style.transition='opacity 0.4s'; setTimeout(function(){window.location.href='/my-docs/docsify.html'},400); }
</script>
</body>
</html>
