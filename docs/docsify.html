<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
      perspective: 600px;
    }
    .loader-wrapper {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; transition: transform 0.1s ease;
    }
    .loader-triangle {
      width: 96px; height: 96px; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2));
      transition: filter 0.1s ease;
    }
    .loader-triangle svg { width: 100%; height: 100%; }
    .triangle-bg { fill: none; stroke: #666; stroke-width: 5; stroke-linejoin: round; }
    .triangle-progress {
      fill: none; stroke: #f1c40f; stroke-width: 6;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 10 110; stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text {
      color: #4a4a4a; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem; letter-spacing: 1px;
    }

    /* ========== 全局布局 ========== */
    body { background: #fff; }

    /* ========== 侧边栏（淡灰 + 轻度景深） ========== */
    .sidebar {
      background: #f5f5f5;
      border-right: 1px solid #e0e0e0;
      box-shadow: 4px 0 16px rgba(0,0,0,0.06);
      transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  box-shadow 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) !important;
      width: 260px;
    }
    .sidebar.close {
      transform: translateX(-100%);
      box-shadow: none;
    }

    /* 侧边栏自定义头部 */
    .sidebar-header {
      display: flex;
      align-items: center;
      padding: 16px 12px;
      border-bottom: 1px solid #e0e0e0;
      height: 56px;
      box-sizing: border-box;
      gap: 8px;
    }
    .sidebar-brand {
      font-size: 1.15rem;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 0.9rem;
      outline: none;
      display: none;
    }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: background 0.2s; color: #555;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.08); }
    .icon-btn svg {
      width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2;
    }

    /* 全文搜索框（原生） */
    .sidebar .search {
      margin: 8px 12px;
      display: none;
    }
    .sidebar .search.show { display: block; }
    .sidebar .search input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    /* 隐藏原生切换按钮 */
    .sidebar-toggle { display: none !important; }

    /* ========== 文档区域固定抬头 ========== */
    .doc-header {
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      height: 56px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 999;
      transition: left 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  background 0.4s;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
      overflow: visible;           /* 允许胶囊溢出显示 */
    }
    body.close .doc-header { left: 0; }

    /* 抬头内标题 */
    .doc-title {
      font-size: 15px;
      font-weight: 500;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ========== 胶囊按钮组（侧边栏关闭时显示） ========== */
    .capsule {
      display: none;
      align-items: center;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #e0e0e0;
      border-radius: 24px;
      padding: 4px 8px;
      gap: 4px;
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;              /* 确保在标题之上 */
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body.close .capsule { display: flex; }
    /* 侧边栏打开时标题不需要让位 */
    body.close .doc-title { padding-left: 80px; }

    /* 胶囊内按钮微调 */
    .capsule .icon-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      color: #555;
    }
    .capsule .icon-btn:hover { background: rgba(0,0,0,0.1); }

    /* 文档正文区域避开抬头 */
    .markdown-section {
      padding-top: 56px !important;
    }

    /* 移动端适配 */
    @media screen and (max-width: 768px) {
      .doc-header { left: 0; }
      .sidebar { box-shadow: 2px 0 12px rgba(0,0,0,0.08); }
      body.close .doc-title { padding-left: 70px; }
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载层 -->
  <div id="loading">
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle" id="loaderTriangle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon class="triangle-bg" points="50,10 91.7,80 8.3,80" />
          <polygon class="triangle-progress" points="50,10 91.7,80 8.3,80" pathLength="120" />
        </svg>
      </div>
      <div class="loading-text">正在加载文档</div>
    </div>
  </div>

  <!-- 文档区域固定抬头 -->
  <div class="doc-header" id="docHeader">
    <!-- 胶囊按钮组（仅侧边栏关闭时可见） -->
    <div class="capsule" id="capsuleGroup">
      <button class="icon-btn" id="capsuleSidebarBtn" title="打开侧边栏">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="icon-btn" id="capsuleSearchBtn" title="全文搜索">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
    </div>
    <span class="doc-title" id="docTitle">文档加载中…</span>
  </div>

  <!-- Docsify 渲染容器 -->
  <div id="app"></div>

  <script>
    // ========== Docsify 配置 ==========
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      search: {
        maxAge: 86400000,
        placeholder: '搜索文档内容...',
        noData: '无结果'
      },
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            // 隐藏加载层
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
                if (window._loaderMouseHandler) {
                  document.removeEventListener('mousemove', window._loaderMouseHandler);
                }
              }, 500);
            }

            // ===== 侧边栏改造 =====
            var sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              // 创建自定义头部
              var header = document.createElement('div');
              header.className = 'sidebar-header';
              header.innerHTML = `
                <span class="sidebar-brand" id="sidebarBrand">我的知识库</span>
                <input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤文档名…">
                <div class="sidebar-actions">
                  <button class="icon-btn" id="sidebarSearchBtn" title="搜索文档名">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
                  </button>
                  <button class="icon-btn" id="sidebarCloseBtn" title="收起侧边栏">
                    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                  </button>
                </div>
              `;
              var nav = sidebar.querySelector('.sidebar-nav');
              if (nav) {
                sidebar.insertBefore(header, nav);
              } else {
                sidebar.appendChild(header);
              }

              // 获取元素
              var brand = document.getElementById('sidebarBrand');
              var filterInput = document.getElementById('sidebarFilterInput');
              var searchBtn = document.getElementById('sidebarSearchBtn');
              var closeBtn = document.getElementById('sidebarCloseBtn');

              // 文档名搜索切换
              searchBtn.addEventListener('click', function() {
                if (filterInput.classList.contains('show')) {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                  brand.classList.remove('hidden');
                  filterSidebarLinks('');
                } else {
                  brand.classList.add('hidden');
                  filterInput.classList.add('show');
                  filterInput.focus();
                  var fullSearch = document.querySelector('.sidebar .search');
                  if (fullSearch) fullSearch.classList.remove('show');
                }
              });

              // 文档名过滤功能
              function filterSidebarLinks(keyword) {
                var links = document.querySelectorAll('.sidebar-nav li');
                var lowerKeyword = keyword.toLowerCase();
                links.forEach(function(li) {
                  var text = li.textContent.trim().toLowerCase();
                  li.style.display = (lowerKeyword === '' || text.includes(lowerKeyword)) ? '' : 'none';
                });
              }
              filterInput.addEventListener('input', function(e) {
                filterSidebarLinks(e.target.value);
              });
              filterInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                  brand.classList.remove('hidden');
                  filterSidebarLinks('');
                }
              });

              // 关闭侧边栏按钮
              closeBtn.addEventListener('click', function() {
                document.body.classList.add('close');
                // 关闭侧边栏后，自动隐藏全文搜索框和文档名过滤
                var fullSearch = document.querySelector('.sidebar .search');
                if (fullSearch) fullSearch.classList.remove('show');
                filterInput.classList.remove('show');
                filterInput.value = '';
                brand.classList.remove('hidden');
                filterSidebarLinks('');
              });

              // 移动原生全文搜索框到侧边栏头部下方
              var nativeSearch = sidebar.querySelector('.search');
              if (nativeSearch) {
                header.after(nativeSearch);
              }
            }

            // ===== 胶囊按钮组功能 =====
            var capsuleSidebarBtn = document.getElementById('capsuleSidebarBtn');
            var capsuleSearchBtn = document.getElementById('capsuleSearchBtn');
            if (capsuleSidebarBtn) {
              capsuleSidebarBtn.addEventListener('click', function() {
                document.body.classList.remove('close');
                // 打开侧边栏后，确保搜索框等恢复默认
                var fullSearch = document.querySelector('.sidebar .search');
                if (fullSearch) fullSearch.classList.remove('show');
                var filterInput = document.getElementById('sidebarFilterInput');
                var brand = document.getElementById('sidebarBrand');
                if (filterInput) {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                }
                if (brand) brand.classList.remove('hidden');
                filterSidebarLinks('');
              });
            }
            if (capsuleSearchBtn) {
              capsuleSearchBtn.addEventListener('click', function() {
                // 打开侧边栏
                document.body.classList.remove('close');
                // 显示全文搜索框，隐藏文档名过滤
                var fullSearch = document.querySelector('.sidebar .search');
                var filterInput = document.getElementById('sidebarFilterInput');
                var brand = document.getElementById('sidebarBrand');
                if (fullSearch) {
                  fullSearch.classList.add('show');
                  var input = fullSearch.querySelector('input');
                  if (input) setTimeout(function() { input.focus(); }, 100);
                }
                if (filterInput) {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                }
                if (brand) brand.classList.remove('hidden');
                // 恢复侧边栏链接
                var links = document.querySelectorAll('.sidebar-nav li');
                links.forEach(function(li) { li.style.display = ''; });
              });
            }

            // 辅助过滤函数（避免未定义）
            window._filterSidebarLinks = function(keyword) {
              var links = document.querySelectorAll('.sidebar-nav li');
              var lowerKeyword = keyword.toLowerCase();
              links.forEach(function(li) {
                var text = li.textContent.trim().toLowerCase();
                li.style.display = (lowerKeyword === '' || text.includes(lowerKeyword)) ? '' : 'none';
              });
            };

            // 初始状态：侧边栏默认打开
            document.body.classList.remove('close');
            var fullSearch = document.querySelector('.sidebar .search');
            if (fullSearch) fullSearch.classList.remove('show');

            // 首次加载后更新文档标题
            updateDocTitle();
          });

          // 每次内容加载后更新标题
          hook.doneEach(function() {
            updateDocTitle();
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // 更新文档抬头标题
    function updateDocTitle() {
      var activeLink = document.querySelector('.sidebar-nav .active');
      var title = '';
      if (activeLink) {
        title = activeLink.textContent.trim();
      } else {
        var h1 = document.querySelector('.markdown-section h1');
        if (h1) title = h1.textContent.trim();
      }
      var docTitle = document.getElementById('docTitle');
      if (docTitle) docTitle.textContent = title || '文档';
    }

    // MathJax 配置
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };

    // 加载动画立体交互
    (function() {
      var wrapper = document.getElementById('loaderWrapper');
      var triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;
      var maxAngle = 10;
      var baseFilter = 'drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2))';
      function handleMouse(e) {
        var halfW = window.innerWidth/2, halfH = window.innerHeight/2;
        var dx = (e.clientX - halfW) / halfW, dy = (e.clientY - halfH) / halfH;
        var rotateY = dx * maxAngle, rotateX = -dy * maxAngle;
        wrapper.style.transform = 'rotateX('+rotateX+'deg) rotateY('+rotateY+'deg) translateZ(15px)';
        var sx = dx * 8, sy = dy * 8;
        triangle.style.filter = baseFilter + ' drop-shadow('+sx+'px '+sy+'px 8px rgba(0,0,0,0.35))';
      }
      document.addEventListener('mousemove', handleMouse);
      window._loaderMouseHandler = handleMouse;
    })();
  </script>

  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 全文搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- MathJax 3 -->
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
