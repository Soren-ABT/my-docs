<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    .loader-triangle {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
    }

    .loader-triangle svg {
      width: 100%;
      height: 100%;
    }

    /* 景深阴影三角形：稍偏移的深色半透明层 */
    .triangle-shadow {
      fill: none;
      stroke: rgba(0, 0, 0, 0.25);
      stroke-width: 6;
      stroke-linejoin: round;
      transform: translate(3px, 3px);   /* 向右下偏移，形成厚度 */
    }

    /* 主三角形边框（无填充） */
    .triangle-bg {
      fill: none;                       /* 去掉填充 */
      stroke: #666666;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    /* 黄色进度条 */
    .triangle-progress {
      fill: none;
      stroke: #f1c40f;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 110;
      stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    @keyframes dashRhythm {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -120; }
    }

    .loading-text {
      color: #4a4a4a;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-triangle">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- 景深阴影层（偏移后绘制在底层） -->
        <polygon class="triangle-shadow"
                 points="50,10 91.7,80 8.3,80" />
        <!-- 主三角形边框 -->
        <polygon class="triangle-bg"
                 points="50,10 91.7,80 8.3,80" />
        <!-- 黄色进度条（覆盖在最上层） -->
        <polygon class="triangle-progress"
                 points="50,10 91.7,80 8.3,80"
                 pathLength="120" />
      </svg>
    </div>
    <div class="loading-text">正在加载文档</div>
  </div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
              }, 500);
            }
          });
        },
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    window.MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
