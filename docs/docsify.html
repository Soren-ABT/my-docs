<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* 毛玻璃效果：半透明背景 + 模糊 */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    /* 三角形加载图标容器 */
    .loader-triangle {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
    }

    .loader-triangle svg {
      width: 100%;
      height: 100%;
    }

    /* 灰色三角形边框（背景） */
    .triangle-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 4;
      stroke-linejoin: round;
    }

    /* 黄色进度条，长度为三角形边长的1/4（pathLength=120，进度条占10单位） */
    .triangle-progress {
      fill: none;
      stroke: #f1c40f;          /* 明亮的黄色 */
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* 虚线段：长度10，间隔110（总120） */
      stroke-dasharray: 10 110;
      stroke-dashoffset: 0;
      /* 动画：模仿Win10加载点的韵律感，使用cubic-bezier让移动富有弹性 */
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    /* 关键帧：通过改变dashoffset实现进度条沿三角形边框移动 */
    @keyframes dashRhythm {
      0% {
        stroke-dashoffset: 0;
      }
      100% {
        stroke-dashoffset: -120;
      }
    }

    /* 加载文字 */
    .loading-text {
      color: rgba(255, 255, 255, 0.8);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载层 -->
  <div id="loading">
    <!-- 三角形加载框 -->
    <div class="loader-triangle">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景三角形：等边三角形，顶点坐标计算得出 -->
        <polygon class="triangle-bg"
                 points="50,10 91.7,80 8.3,80" />
        <!-- 黄色进度条：使用相同顶点，设置pathLength=120 -->
        <polygon class="triangle-progress"
                 points="50,10 91.7,80 8.3,80"
                 pathLength="120" />
      </svg>
    </div>
    <div class="loading-text">正在加载文档</div>
  </div>

  <!-- Docsify 渲染容器 -->
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      plugins: [
        // 1. 加载完成隐藏动画
        function(hook, vm) {
          hook.ready(function() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
              }, 500); // 稍长一点让淡出动画完整
            }
          });
        },
        // 2. 每次页面渲染后触发 MathJax 排版
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // MathJax 配置
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };
  </script>

  <!-- Docsify 核心库 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- MathJax 3 -->
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
