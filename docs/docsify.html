<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- 等宽编程字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease; perspective: 600px;
    }
    .loader-wrapper {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; transition: transform 0.1s ease;
    }
    .loader-triangle {
      width: 96px; height: 96px; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2));
    }
    .loader-triangle svg { width: 100%; height: 100%; }
    .triangle-bg { fill: none; stroke: #666; stroke-width: 5; stroke-linejoin: round; }
    .triangle-progress {
      fill: none; stroke: #f1c40f; stroke-width: 6;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 10 110; stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text {
      color: #4a4a4a; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem; letter-spacing: 1px;
    }

    /* ========== 侧边栏 ========== */
    .sidebar {
      background: #f5f5f5; border-right: 1px solid #e0e0e0;
      box-shadow: 4px 0 16px rgba(0,0,0,0.06);
      transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  box-shadow 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) !important;
      width: 260px;
    }
    .sidebar.close { transform: translateX(-100%); box-shadow: none; }
    .sidebar-header {
      display: flex; align-items: center; padding: 16px 12px;
      border-bottom: 1px solid #e0e0e0; height: 56px; gap: 8px;
    }
    .sidebar-brand {
      font-size: 1.15rem; font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input {
      flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; font-size: 0.9rem; outline: none; display: none;
    }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: background 0.2s; color: #555;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.08); }
    .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    .sidebar-toggle { display: none !important; }

    /* 侧边栏条目 */
    .sidebar-nav li { list-style: none; margin: 2px 0; }
    .sidebar-nav a, .sidebar-nav .folder-item > span:first-child, .sidebar-nav .folder-item > a {
      display: block; padding: 6px 12px; border-radius: 8px;
      color: #333; text-decoration: none; transition: background 0.15s;
      cursor: pointer; background: transparent;
    }
    .sidebar-nav a:hover, .sidebar-nav .folder-item:hover > a, .sidebar-nav .folder-item:hover > span:first-child {
      background: rgba(0,0,0,0.06);
    }
    .sidebar-nav .active > a { background: rgba(0,0,0,0.08); font-weight: 500; }

    .folder-item {
      display: flex !important;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .folder-item > a, .folder-item > span:first-child {
      flex: 1 1 auto;
      max-width: calc(100% - 28px);
    }
    .folder-item > ul {
      flex-basis: 100%;
      width: 100%;
    }

    .folder-toggle {
      font-size: 14px; font-weight: bold;
      color: #666; user-select: none;
      min-width: 16px; text-align: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    .sidebar-nav ul.sidebar-sub {
      padding-left: 1.5rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .sidebar-nav ul.sidebar-sub.expanded {
      max-height: 600px;
    }
    .sidebar-nav > ul { padding-left: 0; }
    .sidebar-nav ul.sidebar-sub li { font-size: 0.9rem; }

    .sidebar-nav li.filtered-out {
      display: none !important;
    }

    /* ========== 文档区域固定抬头 ========== */
    .doc-header {
      position: fixed; top: 0; left: 260px; right: 0; height: 56px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05);
      display: none; align-items: center; padding: 0 24px; z-index: 999;
      transition: left 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }
    body.close .doc-header { left: 0; }
    .doc-title {
      font-size: 15px; font-weight: 500; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .markdown-section { padding-top: 56px !important; max-width: 960px; margin: 0 auto; }

    .capsule {
      display: none; align-items: center; background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px); border: 1px solid #e0e0e0; border-radius: 24px;
      padding: 4px 8px; gap: 4px; position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body.close .capsule { display: flex; }
    body.close .doc-title { padding-left: 80px; }
    .capsule .icon-btn { width: 28px; height: 28px; border-radius: 50%; }
    .capsule .icon-btn:hover { background: rgba(0,0,0,0.1); }

    /* ========== 全文搜索模态 ========== */
    .search-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
      z-index: 10000; display: none; align-items: flex-start; justify-content: center;
      padding-top: 10vh;
    }
    .search-modal-overlay.active { display: flex; }
    .search-modal {
      background: #fff; border-radius: 24px; width: 90%; max-width: 600px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden;
      display: flex; flex-direction: column; max-height: 70vh;
    }
    .search-modal-header { display: flex; align-items: center; padding: 12px 18px; border-bottom: 1px solid #eee; }
    .search-modal-header .search-icon { color: #888; margin-right: 10px; }
    .search-modal-input { flex: 1; border: none; outline: none; font-size: 1.1rem; padding: 8px 0; background: transparent; }
    .search-modal-close { background: none; border: none; cursor: pointer; color: #888; padding: 4px; border-radius: 50%; }
    .search-modal-close:hover { background: #f0f0f0; color: #333; }
    .search-results { overflow-y: auto; flex: 1; padding: 8px 0; }
    .search-result-item { padding: 10px 18px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
    .search-result-item:hover { background: #f9f9f9; }
    .search-result-item mark { background: #b9f6ca; border-radius: 2px; }
    .search-no-results { padding: 20px; text-align: center; color: #888; }

    /* ========== 代码块卡片样式 ========== */
    .code-block-wrapper {
      margin: 1.8rem 0; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06); background: #f8f9fa;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .code-toolbar {
      display: flex; justify-content: space-between; padding: 0.6rem 1.2rem;
      background: rgba(0,0,0,0.04); border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .code-lang { font-weight: 500; text-transform: uppercase; font-size: 0.75rem; opacity: 0.8; }
    .code-copy-btn {
      background: transparent; border: 1px solid #d0d0d0; color: #555;
      padding: 3px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
    }
    .code-block-wrapper pre { margin: 0; padding: 1.2rem 1.5rem; overflow-x: auto; background: transparent; }
    .code-block-wrapper pre code {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.9rem; line-height: 1.65; color: #24292e;
    }

    .markdown-section .token.comment { color: #6a737d !important; font-style: italic; }
    .markdown-section .token.keyword { color: #d73a49 !important; }
    .markdown-section .token.string { color: #032f62 !important; }
    .markdown-section .token.number { color: #005cc5 !important; }
    .markdown-section .token.function { color: #6f42c1 !important; }

    @media (prefers-color-scheme: dark) {
      .code-block-wrapper { background: #1e1e1e; border-color: #2d2d2d; }
      .code-block-wrapper pre code { color: #d4d4d4 !important; }
      .markdown-section .token.comment { color: #6a9955 !important; }
      .markdown-section .token.keyword { color: #569cd6 !important; }
      .markdown-section .token.string { color: #ce9178 !important; }
      .markdown-section .token.number { color: #b5cea8 !important; }
      .markdown-section .token.function { color: #dcdcaa !important; }
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载 -->
  <div id="loading">
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle" id="loaderTriangle">
        <svg viewBox="0 0 100 100"><polygon class="triangle-bg" points="50,10 91.7,80 8.3,80"/><polygon class="triangle-progress" points="50,10 91.7,80 8.3,80" pathLength="120"/></svg>
      </div>
      <div class="loading-text">正在加载文档</div>
    </div>
  </div>

  <!-- 文档区域固定抬头 -->
  <div class="doc-header" id="docHeader">
    <div class="capsule" id="capsuleGroup">
      <button class="icon-btn" id="capsuleSidebarBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <button class="icon-btn" id="capsuleSearchBtn"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>
    </div>
    <span class="doc-title" id="docTitle">文档加载中…</span>
  </div>

  <!-- 全文搜索模态 -->
  <div class="search-modal-overlay" id="searchModalOverlay">
    <div class="search-modal">
      <div class="search-modal-header">
        <svg class="search-icon" width="22" height="22" viewBox="0 0 24 24" stroke="#888" fill="none"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input type="text" class="search-modal-input" id="searchModalInput" placeholder="在文档中搜索…">
        <button class="search-modal-close" id="searchModalClose"><svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div id="app"></div>

  <!-- ========== 存储容错层（必须在 Docsify 之前执行） ========== -->
  <script>
    // 解决 Edge Tracking Prevention 阻止第三方 CDN 访问 localStorage 的问题
    // Docsify / MathJax 内部依赖 localStorage——如果被浏览器拦截会抛 SecurityError
    // 导致 hook.ready() 永不触发，加载页永远不消失。
    // 这里将失败的存储操作降级为内存存储。
    (function() {
      var memStore = {};

      function isBlocked() {
        try {
          var k = '__storagetest__';
          localStorage.setItem(k, '1');
          localStorage.removeItem(k);
          return false;
        } catch (e) {
          return true;
        }
      }

      if (!isBlocked()) return; // 存储可用，无需修补

      // 修补 setItem / getItem / removeItem
      var _setItem = Storage.prototype.setItem;
      var _getItem = Storage.prototype.getItem;
      var _removeItem = Storage.prototype.removeItem;
      var _clear = Storage.prototype.clear;
      var _key = Storage.prototype.key;
      var _length = Object.getOwnPropertyDescriptor(Storage.prototype, 'length');

      Storage.prototype.setItem = function(key, value) {
        try { _setItem.call(this, key, value); }
        catch (e) { memStore[key] = String(value); }
      };
      Storage.prototype.getItem = function(key) {
        try { return _getItem.call(this, key); }
        catch (e) { return key in memStore ? memStore[key] : null; }
      };
      Storage.prototype.removeItem = function(key) {
        try { _removeItem.call(this, key); }
        catch (e) { delete memStore[key]; }
      };
      Storage.prototype.clear = function() {
        try { _clear.call(this); }
        catch (e) { memStore = {}; }
      };

      // 修补 length 和 key()——部分库会遍历 storage
      if (_length && _length.get) {
        Object.defineProperty(Storage.prototype, 'length', {
          get: function() {
            try { return _length.get.call(this); }
            catch (e) { return Object.keys(memStore).length; }
          },
          configurable: true
        });
      }
      Storage.prototype.key = function(index) {
        try { return _key.call(this, index); }
        catch (e) {
          var keys = Object.keys(memStore);
          return keys[index] || null;
        }
      };

      console.warn('[storage-polyfill] localStorage 已被浏览器拦截，已降级为内存存储（刷新后丢失）。');
    })();
  </script>

  <script>
    // ========== Docsify 配置 ==========
    // ★ 关键：basePath 必须与实际部署路径一致 ★
    //   - 本地开发（如 http://localhost:3000）  →  '/'
    //   - GitHub Pages 用户站点（username.github.io）→  '/'
    //   - GitHub Pages 项目站点（username.github.io/repo）→ '/repo/'
    //   - 如果文件放在 docs/ 子目录 → '/repo/docs/' 等
    var DOCSIFY_BASE_PATH = '/';

    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      basePath: DOCSIFY_BASE_PATH,
      coverpage: false,
      notFoundPage: true,          // 自动使用 _404.md（若不存在则显示默认 404 页）
      plugins: [
        function(hook, vm) {
          // ---------- 一次性初始化 ----------
          hook.ready(function() {
            hideLoading();
            injectSidebarHeader();
            bindCapsuleButtons();
            document.body.classList.remove('close');
            updateDocTitle();
            // 延迟执行取决于 DOM 的初始化
            setTimeout(function() {
              initSidebarFolders();
              fixChinesePaths();
            }, 200);
          });

          // ---------- 每次页面切换 ----------
          hook.doneEach(function() {
            updateDocTitle();
            closeSearchModal();
            enhanceCodeBlocks();
            setTimeout(function() {
              initSidebarFolders();
              fixChinesePaths();
            }, 150);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // ========== 加载遮罩关闭（含超时兜底） ==========
    var _loadingHidden = false;
    function hideLoading() {
      if (_loadingHidden) return;
      _loadingHidden = true;
      var loadingEl = document.getElementById('loading');
      var docHeader = document.getElementById('docHeader');
      if (loadingEl) {
        loadingEl.style.opacity = '0';
        setTimeout(function() {
          if (loadingEl) loadingEl.style.display = 'none';
          if (docHeader) docHeader.style.display = 'flex';
          if (window._loaderMouseHandler) {
            document.removeEventListener('mousemove', window._loaderMouseHandler);
            window._loaderMouseHandler = null;
          }
        }, 500);
      } else {
        if (docHeader) docHeader.style.display = 'flex';
      }
    }

    // 兜底：8 秒后无论如何隐藏加载遮罩（防止任何原因导致永远卡在加载页）
    setTimeout(function() {
      if (!_loadingHidden) {
        console.warn('[docsify] 加载超时（8s），强制关闭加载遮罩。请检查 basePath 及网络请求。');
        hideLoading();
      }
    }, 8000);

    // ========== 侧边栏头部注入 ==========
    function injectSidebarHeader() {
      var sidebar = document.querySelector('.sidebar');
      if (!sidebar || sidebar.querySelector('.sidebar-header')) return;
      var nav = sidebar.querySelector('.sidebar-nav');
      if (!nav) return;

      var header = document.createElement('div');
      header.className = 'sidebar-header';
      header.innerHTML =
        '<span class="sidebar-brand" id="sidebarBrand">知识库总览</span>' +
        '<input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤文档名…">' +
        '<div class="sidebar-actions">' +
          '<button class="icon-btn" id="sidebarSearchBtn" title="全文搜索">' +
            '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>' +
          '</button>' +
          '<button class="icon-btn" id="sidebarFilterToggleBtn" title="过滤侧边栏">' +
            '<svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/></svg>' +
          '</button>' +
          '<button class="icon-btn" id="sidebarCloseBtn" title="关闭侧边栏">' +
            '<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>' +
          '</button>' +
        '</div>';
      sidebar.insertBefore(header, nav);
      bindSidebarHeaderButtons();
    }

    // ========== 绑定侧边栏头部按钮 ==========
    function bindSidebarHeaderButtons() {
      var closeBtn = document.getElementById('sidebarCloseBtn');
      var searchBtn = document.getElementById('sidebarSearchBtn');
      var filterToggleBtn = document.getElementById('sidebarFilterToggleBtn');
      var filterInput = document.getElementById('sidebarFilterInput');
      var brand = document.getElementById('sidebarBrand');

      if (closeBtn) closeBtn.addEventListener('click', function() { document.body.classList.add('close'); });
      if (searchBtn) searchBtn.addEventListener('click', openSearchModal);

      if (filterToggleBtn && filterInput && brand) {
        filterToggleBtn.addEventListener('click', function() {
          if (filterInput.classList.contains('show')) {
            filterInput.classList.remove('show');
            brand.classList.remove('hidden');
            filterInput.value = '';
            filterSidebarItems('');
          } else {
            filterInput.classList.add('show');
            brand.classList.add('hidden');
            filterInput.focus();
          }
        });
      }
      if (filterInput) {
        filterInput.addEventListener('input', function() { filterSidebarItems(this.value); });
        filterInput.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            this.value = '';
            filterSidebarItems('');
            this.classList.remove('show');
            if (brand) brand.classList.remove('hidden');
          }
        });
      }
    }

    // ========== 侧边栏过滤 ==========
    function filterSidebarItems(keyword) {
      var allLis = document.querySelectorAll('.sidebar-nav li');
      if (!keyword || !keyword.trim()) {
        allLis.forEach(function(li) { li.classList.remove('filtered-out'); });
        return;
      }
      var kw = keyword.trim().toLowerCase();
      allLis.forEach(function(li) {
        var linkOrSpan = li.querySelector(':scope > a') || li.querySelector(':scope > span:first-child');
        var text = (linkOrSpan ? linkOrSpan.textContent : li.textContent) || '';
        var childUl = li.querySelector('ul');
        var childMatch = false;
        if (childUl) {
          childUl.querySelectorAll('li').forEach(function(cli) {
            var ct = (cli.querySelector(':scope > a') || cli).textContent || '';
            if (ct.toLowerCase().indexOf(kw) !== -1) childMatch = true;
          });
        }
        if (text.toLowerCase().indexOf(kw) !== -1 || childMatch) {
          li.classList.remove('filtered-out');
          if (childMatch && childUl && !childUl.classList.contains('expanded')) {
            childUl.classList.add('expanded');
            var icon = li.querySelector('.folder-toggle');
            if (icon) icon.textContent = '-';
          }
        } else {
          li.classList.add('filtered-out');
        }
      });
    }

    // ========== 胶囊按钮 ==========
    function bindCapsuleButtons() {
      var b1 = document.getElementById('capsuleSidebarBtn');
      var b2 = document.getElementById('capsuleSearchBtn');
      if (b1) b1.addEventListener('click', function() { document.body.classList.remove('close'); });
      if (b2) b2.addEventListener('click', openSearchModal);
    }

    // ========== 文档抬头标题 ==========
    function updateDocTitle() {
      var active = document.querySelector('.sidebar-nav .active');
      var title = '';
      if (active) {
        var link = active.querySelector(':scope > a');
        title = (link || active).textContent.trim();
      }
      if (!title) {
        var h1 = document.querySelector('.markdown-section h1');
        if (h1) title = h1.textContent.trim();
      }
      if (!title && window.location.hash) {
        title = decodeURIComponent(window.location.hash.substring(1)).replace(/\?.*$/, '');
      }
      var el = document.getElementById('docTitle');
      if (el) el.textContent = title || '文档';
    }

    // ========== 中文路径编码 ==========
    function fixChinesePaths() {
      document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
        var href = a.getAttribute('href');
        if (!href || href === 'javascript:void(0)' || href.startsWith('#') || href.startsWith('http://') || href.startsWith('https://')) return;
        var hi = href.indexOf('#');
        var path = hi === -1 ? href : href.substring(0, hi);
        var hash = hi === -1 ? '' : href.substring(hi);
        var encoded;
        try {
          // 试探是否已编码
          if (decodeURI(path) === path) encoded = encodeURI(path);
          else encoded = path;
        } catch (e) { encoded = encodeURI(path); }
        var neu = encoded + hash;
        if (neu !== href) a.setAttribute('href', neu);
      });
    }

    // ========== 文件夹树初始化 ==========
    function initSidebarFolders() {
      var nav = document.querySelector('.sidebar-nav');
      if (!nav) return;

      var allUls = nav.querySelectorAll('ul');
      allUls.forEach(function(ul) {
        if (ul.parentNode === nav || ul.parentNode.classList.contains('sidebar-nav')) {
          ul.classList.remove('sidebar-sub', 'expanded');
        } else {
          ul.classList.add('sidebar-sub');
        }
      });

      function sortList(ul) {
        var items = Array.from(ul.children).filter(function(c) { return c.tagName === 'LI'; });
        items.sort(function(a, b) {
          var aDir = !!a.querySelector('ul'), bDir = !!b.querySelector('ul');
          if (aDir && !bDir) return -1;
          if (!aDir && bDir) return 1;
          var at = (a.querySelector(':scope > a') || a.querySelector(':scope > span:first-child') || a).textContent.trim();
          var bt = (b.querySelector(':scope > a') || b.querySelector(':scope > span:first-child') || b).textContent.trim();
          return at.localeCompare(bt, 'zh');
        });
        items.forEach(function(li) { ul.appendChild(li); });
      }
      allUls.forEach(sortList);

      nav.querySelectorAll('li').forEach(function(li) {
        var childUl = li.querySelector('ul');
        if (!childUl) return;
        if (li.classList.contains('folder-item') && li.querySelector('.folder-toggle')) return;
        li.classList.add('folder-item');

        var textEl = li.querySelector(':scope > a');
        if (!textEl) {
          var firstText = null;
          for (var i = 0; i < li.childNodes.length; i++) {
            if (li.childNodes[i].nodeType === 3 && li.childNodes[i].textContent.trim()) {
              firstText = li.childNodes[i]; break;
            }
          }
          textEl = document.createElement('span');
          textEl.textContent = firstText ? firstText.textContent.trim() : (li.textContent.replace(childUl.textContent || '', '').trim() || '目录');
          if (firstText) li.replaceChild(textEl, firstText);
          else { li.innerHTML = ''; li.appendChild(textEl); li.appendChild(childUl); }
        }
        textEl.style.cursor = 'pointer';

        var icon = document.createElement('span');
        icon.className = 'folder-toggle';
        icon.textContent = childUl.classList.contains('expanded') ? '-' : '+';
        li.appendChild(icon);

        function toggle(e) {
          if (e.target.tagName === 'A' && e.target !== textEl) return;
          e.preventDefault(); e.stopPropagation();
          if (childUl.classList.contains('expanded')) {
            childUl.classList.remove('expanded'); icon.textContent = '+';
          } else {
            childUl.classList.add('expanded'); icon.textContent = '-';
          }
        }
        icon.addEventListener('click', toggle);
        textEl.addEventListener('click', toggle);
      });
    }

    // ========== 代码块增强 ==========
    function enhanceCodeBlocks() {
      document.querySelectorAll('.markdown-section pre').forEach(function(pre) {
        if (pre.parentNode.classList.contains('code-block-wrapper')) return;
        var code = pre.querySelector('code'), lang = '';
        if (code && code.className) {
          var m = code.className.match(/lang(?:uage)?-(\w+)/);
          if (m) lang = m[1];
        }
        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        var toolbar = document.createElement('div');
        toolbar.className = 'code-toolbar';
        toolbar.innerHTML = '<span class="code-lang">' + (lang || 'code') + '</span>';

        var btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';

        btn.addEventListener('click', function() {
          var text = pre.textContent || '';
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() { showCopied(btn); })
              .catch(function() { fallbackCopy(text, btn); });
          } else { fallbackCopy(text, btn); }
        });

        toolbar.appendChild(btn);
        wrapper.appendChild(toolbar);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
      });

      function showCopied(btn) {
        btn.classList.add('copied'); btn.innerHTML = '✓ 已复制';
        setTimeout(function() {
          btn.classList.remove('copied');
          btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
        }, 2000);
      }

      function fallbackCopy(text, btn) {
        var ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); showCopied(btn); }
        catch (e) { btn.textContent = '复制失败'; }
        document.body.removeChild(ta);
      }
    }

    // ========== 全文搜索 ==========
    var searchModalOverlay = document.getElementById('searchModalOverlay');
    var searchModalInput = document.getElementById('searchModalInput');
    var searchResults = document.getElementById('searchResults');
    var currentHighlights = [];

    function openSearchModal() {
      if (!searchModalOverlay) return;
      searchModalOverlay.classList.add('active');
      searchModalInput.value = '';
      searchResults.innerHTML = '';
      searchModalInput.focus();
      clearHighlights();
    }

    function closeSearchModal() {
      if (!searchModalOverlay) return;
      searchModalOverlay.classList.remove('active');
      searchResults.innerHTML = '';
      clearHighlights();
    }

    function clearHighlights() {
      currentHighlights.forEach(function(mark) {
        var p = mark.parentNode;
        if (p) { p.replaceChild(document.createTextNode(mark.textContent || ''), mark); p.normalize(); }
      });
      currentHighlights = [];
    }

    function highlightInDocument(keyword) {
      clearHighlights();
      if (!keyword || !keyword.trim()) return;
      var container = document.querySelector('.markdown-section');
      if (!container) return;
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode: function(node) {
          if (!node.textContent || !node.textContent.trim()) return NodeFilter.FILTER_REJECT;
          var p = node.parentNode;
          if (!p) return NodeFilter.FILTER_REJECT;
          if (p.tagName === 'SCRIPT' || p.tagName === 'STYLE') return NodeFilter.FILTER_REJECT;
          if (p.closest && (p.closest('.search-modal') || p.closest('.code-copy-btn'))) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      var nodes = [], n;
      while ((n = walker.nextNode())) nodes.push(n);
      if (!nodes.length) return;

      var esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var regex = new RegExp(esc, 'gi');
      nodes.forEach(function(tn) {
        var text = tn.textContent;
        regex.lastIndex = 0;
        var frag = document.createDocumentFragment(), last = 0, match, hit = false;
        while ((match = regex.exec(text)) !== null) {
          hit = true;
          if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
          var mk = document.createElement('mark'); mk.className = 'search-highlight';
          mk.textContent = match[0]; frag.appendChild(mk); currentHighlights.push(mk);
          last = regex.lastIndex;
          if (match[0].length === 0) { regex.lastIndex++; if (regex.lastIndex > text.length) break; }
        }
        if (hit && last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        if (hit && frag.childNodes.length) tn.parentNode.replaceChild(frag, tn);
      });
    }

    function generateSearchResults(keyword) {
      searchResults.innerHTML = '';
      if (!keyword || !keyword.trim()) return;
      var container = document.querySelector('.markdown-section');
      if (!container) { searchResults.innerHTML = '<div class="search-no-results">当前没有可搜索的文档内容</div>'; return; }

      var blocks = container.querySelectorAll('p, li, td, th, h1, h2, h3, h4, h5, h6');
      var esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var regex = new RegExp(esc, 'gi'), seen = new Set(), count = 0;

      blocks.forEach(function(block) {
        if (block.closest('pre') || block.closest('.code-block-wrapper')) return;
        if (seen.has(block)) return;
        var text = block.textContent || '';
        regex.lastIndex = 0;
        if (!regex.test(text)) return;
        seen.add(block); count++;
        regex.lastIndex = 0;
        var match = regex.exec(text), idx = match ? match.index : 0, len = match ? match[0].length : 0;
        var start = Math.max(0, idx - 40), end = Math.min(text.length, idx + len + 40);
        var excerpt = (start > 0 ? '…' : '') + text.substring(start, end) + (end < text.length ? '…' : '');
        var div = document.createElement('div');
        div.className = 'search-result-item';
        div.innerHTML = excerpt.replace(new RegExp(esc, 'gi'), '<mark>$&</mark>');
        div.addEventListener('click', function() { closeSearchModal(); block.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
        searchResults.appendChild(div);
      });
      if (count === 0) searchResults.innerHTML = '<div class="search-no-results">未找到匹配内容</div>';
    }

    if (searchModalInput) searchModalInput.addEventListener('input', function() { highlightInDocument(this.value); generateSearchResults(this.value); });
    var closeBtn = document.getElementById('searchModalClose');
    if (closeBtn) closeBtn.addEventListener('click', closeSearchModal);
    if (searchModalOverlay) searchModalOverlay.addEventListener('click', function(e) { if (e.target === searchModalOverlay) closeSearchModal(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && searchModalOverlay && searchModalOverlay.classList.contains('active')) closeSearchModal();
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearchModal(); }
    });

    // ========== MathJax 配置（必须在加载脚本之前） ==========
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']], processEscapes: true },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'], ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
    };

    // ========== 加载动画立体交互 ==========
    (function() {
      var wrapper = document.getElementById('loaderWrapper');
      var triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;
      var maxAngle = 10;
      var baseFilter = 'drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2))';
      function handleMouse(e) {
        var dx = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
        var dy = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
        wrapper.style.transform = 'rotateX(' + (-dy * maxAngle) + 'deg) rotateY(' + (dx * maxAngle) + 'deg) translateZ(15px)';
        triangle.style.filter = baseFilter + ' drop-shadow(' + (dx * 8) + 'px ' + (dy * 8) + 'px 8px rgba(0,0,0,0.35))';
      }
      document.addEventListener('mousemove', handleMouse);
      window._loaderMouseHandler = handleMouse;
    })();
  </script>
