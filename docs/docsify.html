<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
      perspective: 600px;
    }

    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
    }

    .loader-triangle {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15))
              drop-shadow(0 0 2px rgba(0,0,0,0.2));
      transition: filter 0.1s ease;
    }

    .loader-triangle svg {
      width: 100%;
      height: 100%;
    }

    .triangle-bg {
      fill: none;
      stroke: #666666;
      stroke-width: 5;
      stroke-linejoin: round;
    }

    .triangle-progress {
      fill: none;
      stroke: #f1c40f;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 110;
      stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    @keyframes dashRhythm {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -120; }
    }

    .loading-text {
      color: #4a4a4a;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    /* ========== 侧边栏动画与景深 ========== */
    /* 侧边栏默认状态：打开，带阴影景深 */
    .sidebar {
      transition: transform 0.45s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  box-shadow 0.45s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.25);  /* 右侧模糊阴影 */
    }

    /* 侧边栏关闭状态（Docsify 自动添加 .close 类） */
    .sidebar.close {
      transform: translateX(-100%);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);  /* 关闭时无阴影 */
    }

    /* 保证移动端也能正确动画 */
    @media screen and (max-width: 768px) {
      .sidebar {
        transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.25);
      }
    }

    /* 切换按钮始终可见，并调整位置 */
    .sidebar-toggle {
      display: block !important;           /* 覆盖默认隐藏 */
      position: fixed;
      top: 20px;
      left: 260px;                         /* 侧边栏宽度默认 260px，放在右侧边缘 */
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      border: 1px solid #ddd;
      border-radius: 0 6px 6px 0;
      padding: 6px 10px;
      cursor: pointer;
      transition: left 0.45s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  background 0.3s;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      outline: none;
    }

    /* 按钮图标美化（默认 Docsify 使用三道杠，保留） */
    .sidebar-toggle .sidebar-toggle-button {
      /* 保持默认样式，可调整颜色 */
      background: #555;
    }

    /* 当侧边栏关闭时，按钮移到最左侧 */
    body.close .sidebar-toggle {
      left: 10px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* 避免按钮在加载动画时可见 */
    #loading .sidebar-toggle {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载层 -->
  <div id="loading">
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle" id="loaderTriangle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon class="triangle-bg"
                   points="50,10 91.7,80 8.3,80" />
          <polygon class="triangle-progress"
                   points="50,10 91.7,80 8.3,80"
                   pathLength="120" />
        </svg>
      </div>
      <div class="loading-text">正在加载文档</div>
    </div>
  </div>

  <!-- Docsify 渲染容器 -->
  <div id="app"></div>

  <script>
    // ========== Docsify 配置 ==========
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      // 侧边栏默认打开（不设置 closeSidebar 即为打开）
      plugins: [
        // 1. 加载动画关闭
        function(hook, vm) {
          hook.ready(function() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
                document.removeEventListener('mousemove', onMouseMove);
              }, 500);
            }
          });
        },
        // 2. 每次页面渲染后触发 MathJax 排版
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // ========== MathJax 配置 ==========
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };

    // ========== 立体加载交互（三角随鼠标微倾） ==========
    (function() {
      var wrapper = document.getElementById('loaderWrapper');
      var triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;

      var maxAngle = 10;
      var baseFilter = 'drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2))';

      function onMouseMove(e) {
        var halfW = window.innerWidth / 2;
        var halfH = window.innerHeight / 2;
        var dx = (e.clientX - halfW) / halfW;
        var dy = (e.clientY - halfH) / halfH;

        var rotateY = dx * maxAngle;
        var rotateX = -dy * maxAngle;
        wrapper.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateZ(15px)';

        var shadowX = dx * 8;
        var shadowY = dy * 8;
        var dynamicShadow = 'drop-shadow(' + shadowX + 'px ' + shadowY + 'px 8px rgba(0,0,0,0.35))';
        triangle.style.filter = baseFilter + ' ' + dynamicShadow;
      }

      document.addEventListener('mousemove', onMouseMove);
    })();
  </script>

  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- MathJax 3 -->
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
