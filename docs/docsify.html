<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- 等宽编程字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.15); /* 稍微增强遮盖力 */
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
      perspective: 600px;
    }
    .loader-wrapper {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; transition: transform 0.1s ease;
    }
    .loader-triangle {
      width: 96px; height: 96px; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2));
      transition: filter 0.1s ease;
    }
    .loader-triangle svg { width: 100%; height: 100%; }
    .triangle-bg { fill: none; stroke: #666; stroke-width: 5; stroke-linejoin: round; }
    .triangle-progress {
      fill: none; stroke: #f1c40f; stroke-width: 6;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 10 110; stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text {
      color: #4a4a4a; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem; letter-spacing: 1px;
    }

    /* ========== 全局布局 ========== */
    body { background: #fff; }

    /* ========== 侧边栏（淡灰 + 轻度景深） ========== */
    .sidebar {
      background: #f5f5f5;
      border-right: 1px solid #e0e0e0;
      box-shadow: 4px 0 16px rgba(0,0,0,0.06);
      transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95),
                  box-shadow 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95) !important;
      width: 260px;
    }
    .sidebar.close { transform: translateX(-100%); box-shadow: none; }

    .sidebar-header {
      display: flex; align-items: center; padding: 16px 12px;
      border-bottom: 1px solid #e0e0e0; height: 56px; box-sizing: border-box; gap: 8px;
    }
    .sidebar-brand {
      font-size: 1.15rem; font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input {
      flex: 1; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px;
      background: #fff; font-size: 0.9rem; outline: none; display: none;
    }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: background 0.2s; color: #555;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.08); }
    .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    .sidebar-toggle { display: none !important; }

    /* ========== 文档区域固定抬头 ========== */
    .doc-header {
      position: fixed; top: 0; left: 260px; right: 0; height: 56px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex; align-items: center; padding: 0 24px; z-index: 999;
      transition: left 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95), background 0.4s;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04); overflow: visible;
      /* 初始隐藏，加载完成后显示（由 JS 控制） */
      visibility: hidden;
    }
    body.close .doc-header { left: 0; }
    .doc-title {
      font-size: 15px; font-weight: 500; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .markdown-section { padding-top: 56px !important; max-width: 960px; margin: 0 auto; }

    /* ========== 胶囊按钮组 ========== */
    .capsule {
      display: none; align-items: center; background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px); border: 1px solid #e0e0e0; border-radius: 24px;
      padding: 4px 8px; gap: 4px; position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body.close .capsule { display: flex; }
    body.close .doc-title { padding-left: 80px; }
    .capsule .icon-btn { width: 28px; height: 28px; border-radius: 50%; color: #555; }
    .capsule .icon-btn:hover { background: rgba(0,0,0,0.1); }

    /* ========== 全文搜索模态框 ========== */
    .search-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); z-index: 10000; display: none;
      align-items: flex-start; justify-content: center; padding-top: 10vh;
    }
    .search-modal-overlay.active { display: flex; }
    .search-modal {
      background: #fff; border-radius: 24px; width: 90%; max-width: 600px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); overflow: hidden;
      display: flex; flex-direction: column; max-height: 70vh;
    }
    .search-modal-header { display: flex; align-items: center; padding: 12px 18px; border-bottom: 1px solid #eee; }
    .search-modal-header .search-icon { color: #888; margin-right: 10px; }
    .search-modal-input { flex: 1; border: none; outline: none; font-size: 1.1rem; padding: 8px 0; background: transparent; }
    .search-modal-close { background: none; border: none; cursor: pointer; color: #888; padding: 4px; border-radius: 50%; }
    .search-modal-close:hover { background: #f0f0f0; color: #333; }
    .search-results { overflow-y: auto; flex: 1; padding: 8px 0; }
    .search-result-item { padding: 10px 18px; cursor: pointer; border-bottom: 1px solid #f5f5f5; font-size: 0.95rem; }
    .search-result-item:hover { background: #f9f9f9; }
    .search-result-item mark { background: #b9f6ca; border-radius: 2px; }
    .search-no-results { padding: 20px; text-align: center; color: #888; }

    /* ========== 代码块卡片样式 ========== */
    .code-block-wrapper {
      margin: 1.8rem 0; border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      background: #f8f9fa; border: 1px solid rgba(0,0,0,0.05);
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .code-block-wrapper:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .code-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1.2rem; background: rgba(0,0,0,0.04);
      border-bottom: 1px solid rgba(0,0,0,0.06); font-size: 0.85rem; color: #555;
    }
    .code-lang { font-weight: 500; text-transform: uppercase; font-size: 0.75rem; opacity: 0.8; }
    .code-copy-btn {
      background: transparent; border: 1px solid #d0d0d0; color: #555;
      padding: 3px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 4px;
    }
    .code-copy-btn:hover { background: #eee; border-color: #bbb; }
    .code-copy-btn.copied { background: #e6f7e6; border-color: #b7eb8f; color: #52c41a; }
    .code-block-wrapper pre {
      margin: 0; padding: 1.2rem 1.5rem; overflow-x: auto;
      background: transparent; border: none; border-radius: 0;
    }
    .code-block-wrapper pre code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 0.9rem; line-height: 1.65; background: transparent !important;
      padding: 0 !important; color: #24292e; white-space: pre;
    }

    /* ========== 语法高亮（浅色模式） ========== */
    .markdown-section .token.comment,
    .markdown-section .token.prolog,
    .markdown-section .token.doctype,
    .markdown-section .token.cdata { color: #6a737d !important; font-style: italic; }

    .markdown-section .token.punctuation { color: #5c6370 !important; }

    .markdown-section .token.property,
    .markdown-section .token.tag,
    .markdown-section .token.boolean,
    .markdown-section .token.number,
    .markdown-section .token.constant,
    .markdown-section .token.symbol,
    .markdown-section .token.deleted { color: #e36209 !important; }

    .markdown-section .token.selector,
    .markdown-section .token.attr-name,
    .markdown-section .token.string,
    .markdown-section .token.char,
    .markdown-section .token.builtin,
    .markdown-section .token.inserted { color: #032f62 !important; }

    .markdown-section .token.operator,
    .markdown-section .token.entity,
    .markdown-section .token.url,
    .markdown-section .language-css .token.string,
    .markdown-section .style .token.string { color: #9a6e3a !important; }

    .markdown-section .token.atrule,
    .markdown-section .token.attr-value,
    .markdown-section .token.keyword { color: #d73a49 !important; }

    .markdown-section .token.function,
    .markdown-section .token.class-name { color: #6f42c1 !important; }

    .markdown-section .token.regex,
    .markdown-section .token.important,
    .markdown-section .token.variable { color: #e36209 !important; }

    /* ========== 深色模式适配 ========== */
    @media (prefers-color-scheme: dark) {
      .code-block-wrapper {
        background: #1e1e1e; border-color: #2d2d2d;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      }
      .code-toolbar { background: rgba(255,255,255,0.05); border-bottom-color: #333; color: #ccc; }
      .code-copy-btn { border-color: #555; color: #ccc; }
      .code-copy-btn:hover { background: #333; }
      .code-copy-btn.copied { background: #1e3a1e; border-color: #2e5a2e; color: #6fcf6f; }
      .code-block-wrapper pre code { color: #d4d4d4 !important; }

      .markdown-section .token.comment,
      .markdown-section .token.prolog,
      .markdown-section .token.doctype,
      .markdown-section .token.cdata { color: #6a9955 !important; }
      .markdown-section .token.punctuation { color: #d4d4d4 !important; }
      .markdown-section .token.property,
      .markdown-section .token.tag,
      .markdown-section .token.boolean,
      .markdown-section .token.number,
      .markdown-section .token.constant,
      .markdown-section .token.symbol,
      .markdown-section .token.deleted { color: #b5cea8 !important; }
      .markdown-section .token.selector,
      .markdown-section .token.attr-name,
      .markdown-section .token.string,
      .markdown-section .token.char,
      .markdown-section .token.builtin,
      .markdown-section .token.inserted { color: #ce9178 !important; }
      .markdown-section .token.operator,
      .markdown-section .token.entity,
      .markdown-section .token.url,
      .markdown-section .language-css .token.string,
      .markdown-section .style .token.string { color: #d4d4d4 !important; }
      .markdown-section .token.atrule,
      .markdown-section .token.attr-value,
      .markdown-section .token.keyword { color: #569cd6 !important; }
      .markdown-section .token.function,
      .markdown-section .token.class-name { color: #dcdcaa !important; }
      .markdown-section .token.regex,
      .markdown-section .token.important,
      .markdown-section .token.variable { color: #d16969 !important; }
    }

    @media (max-width: 768px) {
      .code-block-wrapper pre { padding: 1rem; }
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载层 -->
  <div id="loading">
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle" id="loaderTriangle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon class="triangle-bg" points="50,10 91.7,80 8.3,80" />
          <polygon class="triangle-progress" points="50,10 91.7,80 8.3,80" pathLength="120" />
        </svg>
      </div>
      <div class="loading-text">正在加载文档</div>
    </div>
  </div>

  <!-- 文档区域固定抬头（初始隐藏，加载完成后显示） -->
  <div class="doc-header" id="docHeader" style="visibility: hidden;">
    <div class="capsule" id="capsuleGroup">
      <button class="icon-btn" id="capsuleSidebarBtn" title="打开侧边栏">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="icon-btn" id="capsuleSearchBtn" title="全文搜索">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </button>
    </div>
    <span class="doc-title" id="docTitle">文档加载中…</span>
  </div>

  <!-- 全文搜索模态 -->
  <div class="search-modal-overlay" id="searchModalOverlay">
    <div class="search-modal">
      <div class="search-modal-header">
        <svg class="search-icon" width="22" height="22" viewBox="0 0 24 24" stroke="#888" fill="none" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
        </svg>
        <input type="text" class="search-modal-input" id="searchModalInput" placeholder="在文档中搜索…" autofocus>
        <button class="search-modal-close" id="searchModalClose" title="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            var loadingEl = document.getElementById('loading');
            var docHeader = document.getElementById('docHeader');
            // 初始状态（CSS 中已设置 visibility: hidden），这里也可确保
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
                // 显示抬头
                if (docHeader) docHeader.style.visibility = 'visible';
                if (window._loaderMouseHandler) document.removeEventListener('mousemove', window._loaderMouseHandler);
              }, 500);
            }

            // 侧边栏改造
            var sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              var header = document.createElement('div');
              header.className = 'sidebar-header';
              header.innerHTML = `
                <span class="sidebar-brand" id="sidebarBrand">知识库总览</span>
                <input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤文档名…">
                <div class="sidebar-actions">
                  <button class="icon-btn" id="sidebarSearchBtn" title="搜索文档名">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
                  </button>
                  <button class="icon-btn" id="sidebarCloseBtn" title="收起侧边栏">
                    <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                  </button>
                </div>
              `;
              var nav = sidebar.querySelector('.sidebar-nav');
              if (nav) sidebar.insertBefore(header, nav);
              else sidebar.appendChild(header);

              var brand = document.getElementById('sidebarBrand');
              var filterInput = document.getElementById('sidebarFilterInput');
              var searchBtn = document.getElementById('sidebarSearchBtn');
              var closeBtn = document.getElementById('sidebarCloseBtn');

              function filterSidebarLinks(keyword) {
                var links = document.querySelectorAll('.sidebar-nav li');
                var kw = keyword.toLowerCase();
                links.forEach(li => li.style.display = (kw === '' || li.textContent.toLowerCase().includes(kw)) ? '' : 'none');
              }

              searchBtn.addEventListener('click', function() {
                if (filterInput.classList.contains('show')) {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                  brand.classList.remove('hidden');
                  filterSidebarLinks('');
                } else {
                  brand.classList.add('hidden');
                  filterInput.classList.add('show');
                  filterInput.focus();
                }
              });
              filterInput.addEventListener('input', e => filterSidebarLinks(e.target.value));
              filterInput.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                  filterInput.classList.remove('show');
                  filterInput.value = '';
                  brand.classList.remove('hidden');
                  filterSidebarLinks('');
                }
              });
              closeBtn.addEventListener('click', () => {
                document.body.classList.add('close');
                filterInput.classList.remove('show');
                filterInput.value = '';
                brand.classList.remove('hidden');
                filterSidebarLinks('');
              });
            }

            document.getElementById('capsuleSidebarBtn').addEventListener('click', () => document.body.classList.remove('close'));
            document.getElementById('capsuleSearchBtn').addEventListener('click', openSearchModal);
            document.body.classList.remove('close');
            updateDocTitle();
          });

          hook.doneEach(function() {
            updateDocTitle();
            closeSearchModal();
            enhanceCodeBlocks();
            if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
          });
        }
      ]
    };

    function updateDocTitle() {
      var active = document.querySelector('.sidebar-nav .active');
      var title = active ? active.textContent.trim() : (document.querySelector('.markdown-section h1') || {}).textContent || '';
      document.getElementById('docTitle').textContent = title || '文档';
    }

    // 代码块增强
    function enhanceCodeBlocks() {
      document.querySelectorAll('.markdown-section pre').forEach(pre => {
        if (pre.parentNode.classList.contains('code-block-wrapper')) return;
        var code = pre.querySelector('code');
        var lang = (code && code.className.match(/lang(?:uage)?-(\w+)/) || [])[1] || pre.getAttribute('data-lang') || '';
        var wrapper = document.createElement('div');
        wrapper.className = 'code-block-wrapper';
        var toolbar = document.createElement('div');
        toolbar.className = 'code-toolbar';
        toolbar.innerHTML = '<span class="code-lang">' + (lang || 'code') + '</span>';
        var btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
        btn.onclick = function() {
          navigator.clipboard.writeText(pre.textContent).then(() => {
            btn.classList.add('copied');
            btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
            setTimeout(() => {
              btn.classList.remove('copied');
              btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
            }, 2000);
          }).catch(() => {
            var ta = document.createElement('textarea');
            ta.value = pre.textContent; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            btn.classList.add('copied'); btn.textContent = '已复制';
            setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制'; }, 2000);
          });
        };
        toolbar.appendChild(btn);
        wrapper.appendChild(toolbar);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
      });
    }

    // 全文搜索
    var searchModalOverlay = document.getElementById('searchModalOverlay');
    var searchModalInput = document.getElementById('searchModalInput');
    var searchResults = document.getElementById('searchResults');
    var currentHighlights = [];

    function openSearchModal() {
      searchModalOverlay.classList.add('active');
      searchModalInput.value = ''; searchResults.innerHTML = ''; searchModalInput.focus();
      clearHighlights();
    }
    function closeSearchModal() {
      searchModalOverlay.classList.remove('active');
      searchResults.innerHTML = ''; clearHighlights();
    }
    function clearHighlights() {
      currentHighlights.forEach(mark => {
        var p = mark.parentNode;
        if (p) { p.replaceChild(document.createTextNode(mark.textContent), mark); p.normalize(); }
      });
      currentHighlights = [];
    }

    function highlightInDocument(kw) {
      clearHighlights(); if (!kw.trim()) return;
      var container = document.querySelector('.markdown-section'); if (!container) return;
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode: node => {
          if (node.parentNode.closest('.search-modal, .code-block-wrapper, script, style')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      var nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
      var regex = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      nodes.forEach(node => {
        var text = node.textContent, frag = document.createDocumentFragment(), lastIdx = 0, match;
        while ((match = regex.exec(text)) !== null) {
          if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
          var mark = document.createElement('mark'); mark.className = 'search-highlight'; mark.textContent = match[0];
          frag.appendChild(mark); currentHighlights.push(mark); lastIdx = regex.lastIndex;
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        if (frag.childNodes.length) node.parentNode.replaceChild(frag, node);
      });
    }

    function generateResults(kw) {
      searchResults.innerHTML = ''; if (!kw.trim()) return;
      var container = document.querySelector('.markdown-section'); if (!container) return;
      var blocks = container.querySelectorAll('p, li, td, th, h1, h2, h3, h4, h5, h6, div');
      var regex = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var seen = new Set();
      blocks.forEach(block => {
        var text = block.textContent; regex.lastIndex = 0;
        if (regex.test(text)) {
          if (seen.has(block)) return; seen.add(block);
          var div = document.createElement('div'); div.className = 'search-result-item';
          regex.lastIndex = 0; var match = regex.exec(text) || {};
          var start = Math.max(0, (match.index||0)-40), end = Math.min(text.length, (match.index||0)+(match[0]||'').length+40);
          var excerpt = (start>0?'…':'') + text.slice(start, end) + (end<text.length?'…':'');
          div.innerHTML = excerpt.replace(regex, m => '<mark>' + m + '</mark>');
          div.addEventListener('click', () => block.scrollIntoView({ behavior: 'smooth', block: 'center' }));
          searchResults.appendChild(div);
        }
      });
      if (!searchResults.children.length) searchResults.innerHTML = '<div class="search-no-results">未找到匹配内容</div>';
    }

    searchModalInput.addEventListener('input', () => {
      highlightInDocument(searchModalInput.value);
      generateResults(searchModalInput.value);
    });
    document.getElementById('searchModalClose').addEventListener('click', closeSearchModal);
    searchModalOverlay.addEventListener('click', e => { if (e.target === searchModalOverlay) closeSearchModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && searchModalOverlay.classList.contains('active')) closeSearchModal(); });

    window.MathJax = {
      tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']], processEscapes: true },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'], ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
    };

    // 加载动画立体交互
    (function() {
      var wrapper = document.getElementById('loaderWrapper'), triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;
      var maxAngle = 10, baseFilter = 'drop-shadow(0 0 8px rgba(255,255,255,0.15)) drop-shadow(0 0 2px rgba(0,0,0,0.2))';
      function handleMouse(e) {
        var dx = (e.clientX - innerWidth/2) / (innerWidth/2), dy = (e.clientY - innerHeight/2) / (innerHeight/2);
        wrapper.style.transform = 'rotateX('+(-dy*maxAngle)+'deg) rotateY('+(dx*maxAngle)+'deg) translateZ(15px)';
        triangle.style.filter = baseFilter + ' drop-shadow('+(dx*8)+'px '+(dy*8)+'px 8px rgba(0,0,0,0.35))';
      }
      document.addEventListener('mousemove', handleMouse);
      window._loaderMouseHandler = handleMouse;
    })();
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
