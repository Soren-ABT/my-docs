<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* ========== 毛玻璃加载遮罩 ========== */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
      perspective: 600px;   /* 为内部元素提供 3D 透视舞台 */
    }

    /* 统一容器，方便做立体交互（三角 + 文字） */
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      will-change: transform;
      transform-style: preserve-3d;
    }

    /* 三角形加载图标容器 */
    .loader-triangle {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
    }

    .loader-triangle svg {
      width: 100%;
      height: 100%;
    }

    /* 工业感三角边框（去掉填充，增加景深光晕） */
    .triangle-bg {
      fill: none;                       /* 去除填充 */
      stroke: #666666;
      stroke-width: 5;
      stroke-linejoin: round;
      /* 自然模糊的景深：用多层 drop-shadow 模拟光晕散开 */
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.1))
              drop-shadow(0 0 8px rgba(255,255,255,0.06));
    }

    /* 黄色进度条 */
    .triangle-progress {
      fill: none;
      stroke: #f1c40f;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 110;
      stroke-dashoffset: 0;
      animation: dashRhythm 2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    @keyframes dashRhythm {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -120; }
    }

    /* 加载文字 */
    .loading-text {
      color: #4a4a4a;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 1px;
      text-shadow: none;
    }
  </style>
</head>
<body>
  <!-- 毛玻璃加载层 -->
  <div id="loading">
    <!-- 立体交互包裹层 -->
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon class="triangle-bg"
                   points="50,10 91.7,80 8.3,80" />
          <polygon class="triangle-progress"
                   points="50,10 91.7,80 8.3,80"
                   pathLength="120" />
        </svg>
      </div>
      <div class="loading-text">正在加载文档</div>
    </div>
  </div>

  <div id="app"></div>

  <script>
    // ========== Docsify 配置 ==========
    window.$docsify = {
      name: '我的知识库',
      repo: '',
      loadSidebar: true,
      relativePath: true,
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
              loadingEl.style.opacity = '0';
              setTimeout(function() {
                loadingEl.style.display = 'none';
                // 加载完成后移除鼠标监听，释放资源
                document.removeEventListener('mousemove', onMouseMove);
              }, 500);
            }
          });
        },
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.MathJax && MathJax.typesetPromise) {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // ========== MathJax 配置 ==========
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
        ignoreHtmlClass: 'tex2jax_ignore',
        processHtmlClass: 'tex2jax_process'
      }
    };

    // ========== 立体鼠标交互 ==========
    (function() {
      var wrapper = document.getElementById('loaderWrapper');
      if (!wrapper) return;

      var maxAngle = 8; // 最大倾斜角度（度）

      function onMouseMove(e) {
        // 计算鼠标相对于窗口中心的偏移比（-0.5 ~ 0.5）
        var halfW = window.innerWidth / 2;
        var halfH = window.innerHeight / 2;
        var dx = (e.clientX - halfW) / halfW;
        var dy = (e.clientY - halfH) / halfH;

        // 根据偏移比计算旋转角度（注意：X轴旋转对应上下，用dy；Y轴旋转对应左右，用dx）
        var rotateY = dx * maxAngle;
        var rotateX = -dy * maxAngle;

        // 应用变换，营造薄片立体随鼠标微倾的效果
        wrapper.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateZ(10px)';
      }

      document.addEventListener('mousemove', onMouseMove);
    })();
  </script>

  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- MathJax 3 -->
  <script id="MathJax-script" async src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
