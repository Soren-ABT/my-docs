<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS 变量 —— 亮色 / 暗色双主题
       ============================================================ */
    :root {
      --bg: #fff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #fafafa;
      --text: #333;
      --text-secondary: #666;
      --text-muted: #999;
      --border: #e0e0e0;
      --border-light: rgba(0,0,0,0.06);
      --shadow: rgba(0,0,0,0.06);
      --shadow-lg: rgba(0,0,0,0.12);
      --accent: #c9a962;
      --accent-light: rgba(201,169,98,0.15);
      --code-bg: #f8f9fa;
      --code-border: rgba(0,0,0,0.06);
      --header-bg: rgba(255,255,255,0.85);
      --sidebar-bg: #f5f5f5;
      --sidebar-active: rgba(0,0,0,0.08);
      --progress-bg: #f1c40f;
      --modal-bg: #fff;
      --modal-overlay: rgba(0,0,0,0.3);
      --search-highlight: #b9f6ca;
      --btn-hover: rgba(0,0,0,0.06);
      --toc-bg: rgba(255,255,255,0.95);
      --scrollbar-thumb: #c0c0c0;
      --scrollbar-track: transparent;
    }

    body.dark {
      --bg: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #777;
      --border: #2a2a4a;
      --border-light: rgba(255,255,255,0.06);
      --shadow: rgba(0,0,0,0.3);
      --shadow-lg: rgba(0,0,0,0.5);
      --accent: #f1c40f;
      --accent-light: rgba(241,196,15,0.15);
      --code-bg: #0d1b2a;
      --code-border: #1b2838;
      --header-bg: rgba(26,26,46,0.88);
      --sidebar-bg: #16213e;
      --sidebar-active: rgba(255,255,255,0.08);
      --progress-bg: #f1c40f;
      --modal-bg: #16213e;
      --modal-overlay: rgba(0,0,0,0.6);
      --search-highlight: #3d5a1e;
      --btn-hover: rgba(255,255,255,0.08);
      --toc-bg: rgba(26,26,46,0.95);
      --scrollbar-thumb: #3a3a5a;
      --scrollbar-track: #1a1a2e;
    }

    /* ============================================================
       全局
       ============================================================ */
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      scroll-behavior: smooth;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ============================================================
       毛玻璃加载遮罩
       ============================================================ */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease; perspective: 600px;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .loader-wrapper {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; transition: transform 0.1s ease;
    }
    .loader-triangle {
      width: 80px; height: 80px; margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.1)) drop-shadow(0 0 2px rgba(0,0,0,0.2));
    }
    .loader-triangle svg { width: 100%; height: 100%; }
    .loader-triangle .tri-bg { fill: none; stroke: var(--text-muted); stroke-width: 4; stroke-linejoin: round; }
    .loader-triangle .tri-progress {
      fill: none; stroke: var(--progress-bg); stroke-width: 5;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 8 112; animation: dashRhythm 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
    }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text { color: var(--text-secondary); font-size: 0.9rem; letter-spacing: 1px; }
    .loading-error {
      display: none; margin-top: 1rem; font-size: 0.8rem; color: #c0392b;
      text-align: center; max-width: 320px; line-height: 1.6;
    }
    .loading-error.show { display: block; }

    /* ============================================================
       阅读进度条
       ============================================================ */
    #reading-progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--progress-bg));
      z-index: 10000; transition: width 0.15s linear;
      border-radius: 0 2px 2px 0; pointer-events: none;
    }

    /* ============================================================
       侧边栏
       ============================================================ */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: 4px 0 16px var(--shadow) !important;
      width: 260px !important;
      transition: transform 0.35s cubic-bezier(0.45,0.05,0.55,0.95) !important;
    }
    .sidebar.close { transform: translateX(-100%); }
    .sidebar-toggle { display: none !important; }

    /* 侧边栏头部 */
    .sidebar-header {
      display: flex; align-items: center; padding: 12px 12px;
      border-bottom: 1px solid var(--border); gap: 6px;
      background: var(--sidebar-bg);
    }
    .sidebar-brand {
      font-size: 1.05rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
      min-width: 0;
    }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input {
      flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: 0.82rem; outline: none; display: none;
      transition: border 0.2s; min-width: 0;
    }
    .sidebar-filter-input:focus { border-color: var(--accent); }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    /* 图标按钮 */
    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: background 0.2s, color 0.2s; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--btn-hover); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* 侧边栏条目 */
    .sidebar-nav { padding: 4px 0; }
    .sidebar-nav li { list-style: none; margin: 1px 0; }
    .sidebar-nav a {
      display: block; padding: 7px 14px; border-radius: 8px;
      color: var(--text); text-decoration: none; transition: background 0.15s;
      font-size: 0.9rem;
    }
    .sidebar-nav a:hover { background: var(--btn-hover); }
    .sidebar-nav .active > a { background: var(--sidebar-active); font-weight: 500; color: var(--accent); }
    .sidebar-nav li.filtered-out { display: none !important; }

    /* 文件夹条目 —— + 号紧挨文字右侧 */
    .folder-item {
      display: flex !important;
      flex-wrap: wrap;
      align-items: center;
    }
    .folder-item > a,
    .folder-item > .folder-label {
      flex: 0 1 auto;
      max-width: calc(100% - 26px);
      display: block; padding: 7px 0 7px 14px; border-radius: 8px;
      color: var(--text); cursor: pointer; font-size: 0.9rem;
      text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-item > a:hover,
    .folder-item > .folder-label:hover { background: var(--btn-hover); }
    .folder-item > ul { flex-basis: 100%; width: 100%; }
    .folder-toggle {
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      user-select: none; min-width: 20px; height: 20px; text-align: center;
      flex-shrink: 0; cursor: pointer; line-height: 20px;
      border-radius: 4px; transition: background 0.15s, color 0.15s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .folder-toggle:hover { background: var(--btn-hover); color: var(--accent); }
    .sidebar-nav ul.sidebar-sub {
      padding-left: 1.5rem;
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .sidebar-nav ul.sidebar-sub.expanded { max-height: 600px; }
    .sidebar-nav ul.sidebar-sub li a { font-size: 0.85rem; }

    /* ============================================================
       文档固定抬头
       ============================================================ */
    .doc-header {
      position: fixed; top: 0; left: 260px; right: 0; height: 56px;
      background: var(--header-bg); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      display: none; align-items: center; padding: 0 20px; z-index: 999;
      transition: left 0.35s cubic-bezier(0.45,0.05,0.55,0.95), background 0.3s;
    }
    body.close .doc-header { left: 0; }
    .doc-header-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .doc-title {
      font-size: 15px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-reading-time {
      font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; margin-left: 6px;
    }
    .doc-header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    .capsule {
      display: none; align-items: center; background: var(--header-bg);
      backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px;
      padding: 4px 6px; gap: 2px; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); z-index: 1000; box-shadow: 0 2px 8px var(--shadow);
    }
    body.close .capsule { display: flex; }
    body.close .doc-header-left { padding-left: 68px; }
    .capsule .icon-btn { width: 28px; height: 28px; border-radius: 50%; }

    /* 暗色图标切换 */
    #darkModeBtn .sun-icon, #darkModeBtn .moon-icon { transition: transform 0.4s; }
    body:not(.dark) #darkModeBtn .moon-icon { display: none; }
    body.dark #darkModeBtn .sun-icon { display: none; }

    /* ============================================================
       Markdown 文档区域 —— 居中浏览
       ============================================================ */
    .markdown-section {
      padding-top: 56px !important;
      padding-left: 24px !important;
      padding-right: 24px !important;
      max-width: 860px;
      margin: 0 auto;
    }
    /* 代码块内边距不叠加 */
    .markdown-section .code-block-wrapper pre {
      padding: 1.2rem 1.5rem;
    }

    /* ============================================================
       回到顶部按钮
       ============================================================ */
    #backToTop {
      position: fixed; bottom: 28px; right: 28px; z-index: 998;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #1a1a1a; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px var(--shadow-lg);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #backToTop.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #backToTop:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow-lg); }
    #backToTop svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    /* ============================================================
       页面内目录 (TOC) 浮动面板
       ============================================================ */
    #toc-panel {
      position: fixed; right: 16px; top: 80px; z-index: 997;
      background: var(--toc-bg); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; max-width: 240px; max-height: 60vh;
      overflow-y: auto; font-size: 0.8rem;
      box-shadow: 0 8px 24px var(--shadow);
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0; transform: translateX(20px); pointer-events: none;
    }
    #toc-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #toc-panel .toc-title {
      font-weight: 600; color: var(--text); margin-bottom: 8px;
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    #toc-panel a {
      display: block; padding: 4px 0; color: var(--text-secondary);
      text-decoration: none; border-left: 2px solid transparent;
      padding-left: 8px; transition: all 0.2s; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    #toc-panel a:hover, #toc-panel a.active { color: var(--accent); border-left-color: var(--accent); }
    #toc-panel a.toc-h2 { padding-left: 8px; font-weight: 500; }
    #toc-panel a.toc-h3 { padding-left: 18px; font-size: 0.76rem; }
    #toc-panel a.toc-h4 { padding-left: 28px; font-size: 0.73rem; }

    #tocToggleBtn { position: relative; }
    #tocToggleBtn.active { color: var(--accent); }

    /* ============================================================
       全文搜索模态
       ============================================================ */
    .search-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay); backdrop-filter: blur(6px);
      z-index: 10001; display: none; align-items: flex-start; justify-content: center;
      padding-top: 10vh;
    }
    .search-modal-overlay.active { display: flex; }
    .search-modal {
      background: var(--modal-bg); border-radius: 20px; width: 90%; max-width: 600px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); overflow: hidden;
      display: flex; flex-direction: column; max-height: 70vh;
      border: 1px solid var(--border);
    }
    .search-modal-header {
      display: flex; align-items: center; padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .search-modal-header .search-icon { color: var(--text-muted); margin-right: 10px; flex-shrink: 0; }
    .search-modal-input {
      flex: 1; border: none; outline: none; font-size: 1.1rem;
      padding: 8px 0; background: transparent; color: var(--text);
    }
    .search-modal-input::placeholder { color: var(--text-muted); }
    .search-modal-close {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 4px; border-radius: 50%; flex-shrink: 0;
    }
    .search-modal-close:hover { background: var(--btn-hover); color: var(--text); }
    .search-results { overflow-y: auto; flex: 1; padding: 8px 0; }
    .search-result-item {
      padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light);
      color: var(--text); font-size: 0.9rem; line-height: 1.5;
    }
    .search-result-item:hover { background: var(--btn-hover); }
    .search-result-item mark { background: var(--search-highlight); border-radius: 2px; color: var(--text); }
    .search-no-results { padding: 28px; text-align: center; color: var(--text-muted); }
    .search-result-title { font-weight: 600; margin-bottom: 4px; color: var(--accent); }

    /* ============================================================
       键盘快捷键面板
       ============================================================ */
    #shortcuts-panel {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay); backdrop-filter: blur(4px);
      z-index: 10002; display: none; align-items: center; justify-content: center;
    }
    #shortcuts-panel.active { display: flex; }
    .shortcuts-modal {
      background: var(--modal-bg); border-radius: 16px; padding: 24px 28px;
      max-width: 420px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
    }
    .shortcuts-modal h3 { margin: 0 0 16px; font-size: 1.1rem; color: var(--text); }
    .shortcuts-modal .kbd-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border-light);
      font-size: 0.85rem; color: var(--text-secondary);
    }
    .shortcuts-modal .kbd-row:last-child { border-bottom: none; }
    .shortcuts-modal kbd {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px; font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace; color: var(--accent);
    }

    /* ============================================================
       代码块卡片 + 语法高亮
       ============================================================ */
    .code-block-wrapper {
      margin: 1.6rem 0; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow); background: var(--code-bg);
      border: 1px solid var(--code-border);
    }
    .code-toolbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 1.2rem; background: var(--bg-secondary);
      border-bottom: 1px solid var(--code-border);
    }
    .code-lang {
      font-weight: 600; text-transform: uppercase; font-size: 0.7rem;
      color: var(--text-muted); letter-spacing: 0.5px;
    }
    .code-copy-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 4px;
    }
    .code-copy-btn:hover { background: var(--btn-hover); border-color: var(--accent); color: var(--accent); }
    .code-copy-btn.copied { background: #27ae60; border-color: #27ae60; color: #fff; }
    .code-block-wrapper pre {
      margin: 0; padding: 1.2rem 1.5rem; overflow-x: auto; background: transparent !important;
    }
    .code-block-wrapper pre code {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.88rem; line-height: 1.7;
    }

    /* ============================================================
       Prism 语法高亮 —— 亮色主题
       ============================================================ */
    .markdown-section .token.comment,
    .markdown-section .token.prolog,
    .markdown-section .token.doctype,
    .markdown-section .token.cdata { color: #6a737d; font-style: italic; }
    .markdown-section .token.namespace { opacity: 0.7; }
    .markdown-section .token.punctuation { color: #393a34; }
    .markdown-section .token.property,
    .markdown-section .token.tag,
    .markdown-section .token.boolean,
    .markdown-section .token.number,
    .markdown-section .token.constant,
    .markdown-section .token.symbol,
    .markdown-section .token.deleted { color: #005cc5; }
    .markdown-section .token.selector,
    .markdown-section .token.attr-name,
    .markdown-section .token.string,
    .markdown-section .token.char,
    .markdown-section .token.builtin,
    .markdown-section .token.inserted { color: #032f62; }
    .markdown-section .token.operator,
    .markdown-section .token.entity,
    .markdown-section .token.url { color: #d73a49; }
    .markdown-section .token.atrule,
    .markdown-section .token.attr-value,
    .markdown-section .token.keyword { color: #d73a49; }
    .markdown-section .token.function,
    .markdown-section .token.class-name { color: #6f42c1; }
    .markdown-section .token.regex,
    .markdown-section .token.important,
    .markdown-section .token.variable { color: #e36209; }
    .markdown-section .token.important,
    .markdown-section .token.bold { font-weight: 600; }
    .markdown-section .token.italic { font-style: italic; }

    /* ============================================================
       Prism 语法高亮 —— 暗色主题
       ============================================================ */
    body.dark .markdown-section .token.comment,
    body.dark .markdown-section .token.prolog,
    body.dark .markdown-section .token.doctype,
    body.dark .markdown-section .token.cdata { color: #6a9955; font-style: italic; }
    body.dark .markdown-section .token.punctuation { color: #d4d4d4; }
    body.dark .markdown-section .token.property,
    body.dark .markdown-section .token.tag,
    body.dark .markdown-section .token.boolean,
    body.dark .markdown-section .token.number,
    body.dark .markdown-section .token.constant,
    body.dark .markdown-section .token.symbol,
    body.dark .markdown-section .token.deleted { color: #b5cea8; }
    body.dark .markdown-section .token.selector,
    body.dark .markdown-section .token.attr-name,
    body.dark .markdown-section .token.string,
    body.dark .markdown-section .token.char,
    body.dark .markdown-section .token.builtin,
    body.dark .markdown-section .token.inserted { color: #ce9178; }
    body.dark .markdown-section .token.operator,
    body.dark .markdown-section .token.entity,
    body.dark .markdown-section .token.url { color: #569cd6; }
    body.dark .markdown-section .token.atrule,
    body.dark .markdown-section .token.attr-value,
    body.dark .markdown-section .token.keyword { color: #569cd6; }
    body.dark .markdown-section .token.function,
    body.dark .markdown-section .token.class-name { color: #dcdcaa; }
    body.dark .markdown-section .token.regex,
    body.dark .markdown-section .token.important,
    body.dark .markdown-section .token.variable { color: #e36209; }

    /* 暗色下代码块文字颜色 */
    body.dark .code-block-wrapper pre code { color: #d4d4d4; }

    /* ============================================================
       链接颜色
       ============================================================ */
    .markdown-section a { color: var(--accent); }
    body.dark .markdown-section a { color: #f1c40f; }

    /* ============================================================
       响应式
       ============================================================ */
    @media (max-width: 768px) {
      .sidebar { width: 100% !important; }
      .doc-header { left: 0 !important; }
      .markdown-section { padding-left: 16px !important; padding-right: 16px !important; }
      #toc-panel { display: none !important; }
      #backToTop { bottom: 16px; right: 16px; }
      .search-modal { max-height: 85vh; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <!-- ========== 阅读进度条 ========== -->
  <div id="reading-progress"></div>

  <!-- ========== 毛玻璃加载遮罩 ========== -->

  <!-- ============================================================
       localStorage 容错（Edge 严格跟踪防护）
       ============================================================ -->
  <script>
    (function() {
      var mem = {};
      function blocked() {
        try { var k = '__t__'; localStorage.setItem(k, '1'); localStorage.removeItem(k); return false; }
        catch (e) { return true; }
      }
      if (!blocked()) return;
      var _s = Storage.prototype.setItem, _g = Storage.prototype.getItem;
      var _r = Storage.prototype.removeItem, _c = Storage.prototype.clear;
      Storage.prototype.setItem = function(k, v) { try { _s.call(this, k, v); } catch (e) { mem[k] = String(v); } };
      Storage.prototype.getItem = function(k) { try { return _g.call(this, k); } catch (e) { return k in mem ? mem[k] : null; } };
      Storage.prototype.removeItem = function(k) { try { _r.call(this, k); } catch (e) { delete mem[k]; } };
      Storage.prototype.clear = function() { try { _c.call(this); } catch (e) { mem = {}; } };
    })();
  </script>

  <!-- ============================================================
       Docsify 配置 & 全部插件
       ============================================================ -->
  <script>
    // ★ 部署路径（项目站点）
    var DOCSIFY_BASE_PATH = '/my-docs/';

    window.$docsify = {
      name: 'Soren的知识库',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 0,            // ★ 侧边栏不展开页面内标题层级
      basePath: DOCSIFY_BASE_PATH,
      homepage: 'README.md',
      notFoundPage: true,
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            hideLoading();
            injectSidebarHeader();
            bindGlobalEvents();
            document.body.classList.remove('close');
            updateDocTitle();
            updateReadingTime();
            setTimeout(function() {
              initSidebarFolders();
              generateTOC();
              updateProgressBar();
            }, 250);
          });

          hook.doneEach(function() {
            updateDocTitle();
            updateReadingTime();
            closeSearchModal();
            enhanceCodeBlocks();
            clearTOC();
            setTimeout(function() {
              initSidebarFolders();
              generateTOC();
              updateProgressBar();
            }, 200);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // ============================================================
    // 加载遮罩
    // ============================================================
    var _loaded = false;
    function hideLoading() {
      if (_loaded) return;
      _loaded = true;
      var el = document.getElementById('loading');
      var dh = document.getElementById('docHeader');
      if (el) { el.classList.add('fade-out'); setTimeout(function() { if (el) el.style.display = 'none'; }, 500); }
      if (dh) dh.style.display = 'flex';
      if (window._loaderMouse) { document.removeEventListener('mousemove', window._loaderMouse); window._loaderMouse = null; }
    }
    // 5 秒后显示排查提示（不强制关闭遮罩）
    setTimeout(function() {
      if (!_loaded) { var err = document.getElementById('loadingError'); if (err) err.classList.add('show'); }
    }, 5000);

    // ============================================================
    // 侧边栏头部（仅两个按钮：搜索=过滤切换，关闭）
    // ============================================================
    function injectSidebarHeader() {
      var sidebar = document.querySelector('.sidebar');
      if (!sidebar || sidebar.querySelector('.sidebar-header')) return;
      var nav = sidebar.querySelector('.sidebar-nav');
      if (!nav) return;
      var h = document.createElement('div');
      h.className = 'sidebar-header';
      h.innerHTML =
        '<span class="sidebar-brand" id="sidebarBrand">📚 知识库总览</span>' +
        '<input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤…">' +
        '<div class="sidebar-actions">' +
          '<button class="icon-btn" id="sidebarSearchBtn" title="过滤侧边栏"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>' +
          '<button class="icon-btn" id="sidebarCloseBtn" title="关闭侧边栏"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>' +
        '</div>';
      sidebar.insertBefore(h, nav);
      bindSidebarButtons();
    }

    function bindSidebarButtons() {
      var closeBtn = document.getElementById('sidebarCloseBtn');
      var searchBtn = document.getElementById('sidebarSearchBtn');
      var filterInput = document.getElementById('sidebarFilterInput');
      var brand = document.getElementById('sidebarBrand');

      if (closeBtn) closeBtn.addEventListener('click', function() { document.body.classList.add('close'); });

      // ★ 搜索按钮 → 切换过滤输入框（不再是全局搜索）
      if (searchBtn && filterInput && brand) {
        searchBtn.addEventListener('click', function() {
          if (filterInput.classList.contains('show')) {
            filterInput.classList.remove('show'); brand.classList.remove('hidden');
            filterInput.value = ''; filterSidebarItems('');
          } else {
            filterInput.classList.add('show'); brand.classList.add('hidden');
            filterInput.focus();
          }
        });
      }
      if (filterInput) {
        filterInput.addEventListener('input', function() { filterSidebarItems(this.value); });
        filterInput.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            this.value = ''; filterSidebarItems(''); this.classList.remove('show');
            if (brand) brand.classList.remove('hidden');
          }
        });
      }
    }

    // ============================================================
    // 全局事件绑定
    // ============================================================
    function bindGlobalEvents() {
      // 胶囊按钮
      var cb1 = document.getElementById('capsuleSidebarBtn');
      var cb2 = document.getElementById('capsuleSearchBtn');
      if (cb1) cb1.addEventListener('click', function() { document.body.classList.remove('close'); });
      if (cb2) cb2.addEventListener('click', openSearchModal);  // ★ 全局搜索仅通过胶囊按钮或快捷键

      // 暗色模式
      var dmBtn = document.getElementById('darkModeBtn');
      if (dmBtn) {
        dmBtn.addEventListener('click', toggleDarkMode);
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
      }

      // TOC 切换
      var tocBtn = document.getElementById('tocToggleBtn');
      var tocPanel = document.getElementById('toc-panel');
      if (tocBtn && tocPanel) {
        tocBtn.addEventListener('click', function() {
          tocPanel.classList.toggle('visible');
          tocBtn.classList.toggle('active');
        });
      }

      // 回到顶部
      var btt = document.getElementById('backToTop');
      if (btt) btt.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

      // 滚动监听
      window.addEventListener('scroll', function() {
        updateProgressBar();
        if (btt) btt.classList.toggle('visible', window.scrollY > 400);
        updateTOCHighlight();
      });

      // 搜索模态关闭
      var closeBtn = document.getElementById('searchModalClose');
      var overlay = document.getElementById('searchModalOverlay');
      if (closeBtn) closeBtn.addEventListener('click', closeSearchModal);
      if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSearchModal(); });

      // 搜索输入
      var searchInput = document.getElementById('searchModalInput');
      if (searchInput) searchInput.addEventListener('input', function() {
        highlightInDocument(this.value);
        generateSearchResults(this.value);
      });

      // 键盘快捷键
      document.addEventListener('keydown', handleKeyboardShortcuts);

      // 加载动画 3D 交互
      initLoaderMouse();
    }

    // ============================================================
    // 暗色模式
    // ============================================================
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    // ============================================================
    // 键盘快捷键
    // ============================================================
    function handleKeyboardShortcuts(e) {
      var tag = (e.target.tagName || '').toLowerCase();
      var isInput = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;

      if (e.key === 'Escape') {
        closeSearchModal();
        closeShortcutsPanel();
        var tp = document.getElementById('toc-panel'); if (tp) tp.classList.remove('visible');
        var tb = document.getElementById('tocToggleBtn'); if (tb) tb.classList.remove('active');
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearchModal(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); document.body.classList.toggle('close'); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); toggleDarkMode(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'ArrowUp') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      if (e.key === '?' && !isInput) { e.preventDefault(); openShortcutsPanel(); return; }
    }

    function openShortcutsPanel() { var p = document.getElementById('shortcuts-panel'); if (p) p.classList.add('active'); }
    function closeShortcutsPanel() { var p = document.getElementById('shortcuts-panel'); if (p) p.classList.remove('active'); }

    // ============================================================
    // 阅读进度条
    // ============================================================
    function updateProgressBar() {
      var bar = document.getElementById('reading-progress');
      if (!bar) return;
      var dh = document.documentElement.scrollHeight - window.innerHeight;
      if (dh <= 0) { bar.style.width = '0%'; return; }
      bar.style.width = Math.min(100, Math.max(0, (window.scrollY / dh) * 100)) + '%';
    }

    // ============================================================
    // 阅读时间估算
    // ============================================================
    function updateReadingTime() {
      var el = document.getElementById('readingTime');
      if (!el) return;
      var container = document.querySelector('.markdown-section');
      if (!container) { el.textContent = ''; return; }
      var text = container.textContent || '';
      var words = text.replace(/\s+/g, ' ').trim().split(/\s+/).length;
      var chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
      var minutes = Math.max(1, Math.ceil((words / 200) + (chinese / 400)));
      el.textContent = '⏱ ~' + minutes + ' min';
    }

    // ============================================================
    // 页面内目录 (TOC)
    // ============================================================
    function generateTOC() {
      var container = document.querySelector('.markdown-section');
      var tocContent = document.getElementById('toc-content');
      var tocPanel = document.getElementById('toc-panel');
      var tocBtn = document.getElementById('tocToggleBtn');
      if (!container || !tocContent) return;

      var headings = container.querySelectorAll('h1, h2, h3, h4');
      if (headings.length < 2) {
        if (tocPanel) tocPanel.classList.remove('visible');
        if (tocBtn) { tocBtn.classList.remove('active'); tocBtn.style.display = 'none'; }
        return;
      }
      if (tocBtn) tocBtn.style.display = '';

      var html = '';
      headings.forEach(function(h, i) {
        if (!h.id) h.id = 'toc-' + i;
        var level = h.tagName.toLowerCase();
        html += '<a href="#' + h.id + '" class="toc-' + level + '" data-target="' + h.id + '">' + h.textContent.trim() + '</a>';
      });
      tocContent.innerHTML = html;

      tocContent.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          var target = document.getElementById(a.getAttribute('data-target'));
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
      updateTOCHighlight();
    }

    function updateTOCHighlight() {
      var links = document.querySelectorAll('#toc-content a');
      if (!links.length) return;
      var scrollTop = window.scrollY + 80, activeId = null;
      links.forEach(function(a) {
        var id = a.getAttribute('data-target');
        var el = document.getElementById(id);
        if (el && el.offsetTop <= scrollTop) activeId = id;
      });
      links.forEach(function(a) { a.classList.toggle('active', a.getAttribute('data-target') === activeId); });
    }

    function clearTOC() {
      var tc = document.getElementById('toc-content'); if (tc) tc.innerHTML = '';
      var tp = document.getElementById('toc-panel'); if (tp) tp.classList.remove('visible');
    }

    // ============================================================
    // 文档抬头标题
    // ============================================================
    function updateDocTitle() {
      var active = document.querySelector('.sidebar-nav .active');
      var title = '';
      if (active) { var link = active.querySelector(':scope > a'); title = (link || active).textContent.trim(); }
      if (!title) { var h1 = document.querySelector('.markdown-section h1'); if (h1) title = h1.textContent.trim(); }
      if (!title && window.location.hash) {
        title = decodeURIComponent(window.location.hash.substring(1)).replace(/\?.*$/, '').replace(/-/g, ' ');
      }
      var el = document.getElementById('docTitle');
      if (el) el.textContent = title || '文档';
    }

    // ============================================================
    // 侧边栏过滤
    // ============================================================
    function filterSidebarItems(keyword) {
      var allLis = document.querySelectorAll('.sidebar-nav li');
      if (!keyword || !keyword.trim()) { allLis.forEach(function(l) { l.classList.remove('filtered-out'); }); return; }
      var kw = keyword.trim().toLowerCase();
      allLis.forEach(function(li) {
        var el = li.querySelector(':scope > a') || li.querySelector(':scope > .folder-label');
        var text = (el ? el.textContent : li.textContent) || '';
        var childUl = li.querySelector('ul'), childMatch = false;
        if (childUl) {
          childUl.querySelectorAll('li').forEach(function(cli) {
            if ((cli.textContent || '').toLowerCase().indexOf(kw) !== -1) childMatch = true;
          });
        }
        if (text.toLowerCase().indexOf(kw) !== -1 || childMatch) {
          li.classList.remove('filtered-out');
          if (childMatch && childUl && !childUl.classList.contains('expanded')) {
            childUl.classList.add('expanded');
            var icon = li.querySelector('.folder-toggle');
            if (icon) icon.textContent = '−';
          }
        } else { li.classList.add('filtered-out'); }
      });
    }

    // ============================================================
    // 文件夹树（默认折叠，+ 号紧挨文字右侧，点击文字或 + 号展开）
    // ============================================================
    function initSidebarFolders() {
      var nav = document.querySelector('.sidebar-nav');
      if (!nav) return;

      var allUls = nav.querySelectorAll('ul');
      allUls.forEach(function(ul) {
        if (ul.parentNode === nav || ul.parentNode.classList.contains('sidebar-nav')) {
          ul.classList.remove('sidebar-sub', 'expanded');
        } else { ul.classList.add('sidebar-sub'); }
      });

      // 排序：文件夹优先
      function sortList(ul) {
        var items = Array.from(ul.children).filter(function(c) { return c.tagName === 'LI'; });
        items.sort(function(a, b) {
          var aD = !!a.querySelector('ul'), bD = !!b.querySelector('ul');
          if (aD && !bD) return -1; if (!aD && bD) return 1;
          return (a.textContent || '').trim().localeCompare((b.textContent || '').trim(), 'en');
        });
        items.forEach(function(li) { ul.appendChild(li); });
      }
      allUls.forEach(sortList);

      // 给文件夹 li 添加折叠图标
      nav.querySelectorAll('li').forEach(function(li) {
        var childUl = li.querySelector('ul');
        if (!childUl) return;
        if (li.querySelector('.folder-toggle')) return;

        li.classList.add('folder-item');

        var link = li.querySelector(':scope > a');
        var label;
        if (link) {
          label = link;
          label.classList.add('folder-label');
        } else {
          label = document.createElement('span');
          label.className = 'folder-label';
          var firstText = '';
          for (var i = 0; i < li.childNodes.length; i++) {
            if (li.childNodes[i].nodeType === 3 && li.childNodes[i].textContent.trim()) {
              firstText = li.childNodes[i].textContent.trim(); break;
            }
          }
          label.textContent = firstText || 'Folder';
        }

        var icon = document.createElement('span');
        icon.className = 'folder-toggle';
        icon.textContent = '+';  // ★ 默认折叠
        li.appendChild(icon);

        // ★ 点击文字或 + 号都能展开/折叠
        function toggle(e) {
          if (e.target.tagName === 'A' && e.target !== label && e.target.closest('ul') === childUl) return;
          e.preventDefault(); e.stopPropagation();
          var expanded = childUl.classList.contains('expanded');
          if (expanded) { childUl.classList.remove('expanded'); icon.textContent = '+'; }
          else { childUl.classList.add('expanded'); icon.textContent = '−'; }
        }
        icon.addEventListener('click', toggle);
        label.addEventListener('click', toggle);
      });
    }

    // ============================================================
    // 代码块增强（卡片 + 复制 + 语法高亮保持）
    // ============================================================
    function enhanceCodeBlocks() {
      document.querySelectorAll('.markdown-section pre').forEach(function(pre) {
        if (pre.parentNode.classList.contains('code-block-wrapper')) return;
        var code = pre.querySelector('code'), lang = '';
        if (code && code.className) { var m = code.className.match(/lang(?:uage)?-(\w+)/); if (m) lang = m[1]; }

        var wrapper = document.createElement('div'); wrapper.className = 'code-block-wrapper';
        var toolbar = document.createElement('div'); toolbar.className = 'code-toolbar';
        toolbar.innerHTML = '<span class="code-lang">' + (lang || 'code') + '</span>';

        var btn = document.createElement('button'); btn.className = 'code-copy-btn';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';

        btn.addEventListener('click', function() {
          var text = pre.textContent || '';
          var done = function() {
            btn.classList.add('copied'); btn.innerHTML = '✓ Copied';
            setTimeout(function() {
              btn.classList.remove('copied');
              btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
            }, 2000);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
          } else { fallbackCopy(text, done); }
        });

        toolbar.appendChild(btn); wrapper.appendChild(toolbar);
        pre.parentNode.insertBefore(wrapper, pre); wrapper.appendChild(pre);
      });

      function fallbackCopy(text, cb) {
        var ta = document.createElement('textarea'); ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        if (cb) cb();
      }
    }

    // ============================================================
    // 全文搜索
    // ============================================================
    var currentHighlights = [];

    function openSearchModal() {
      var overlay = document.getElementById('searchModalOverlay');
      var input = document.getElementById('searchModalInput');
      var results = document.getElementById('searchResults');
      if (!overlay) return;
      overlay.classList.add('active');
      if (input) { input.value = ''; input.focus(); }
      if (results) results.innerHTML = '';
      clearHighlights();
    }

    function closeSearchModal() {
      var overlay = document.getElementById('searchModalOverlay');
      var results = document.getElementById('searchResults');
      if (overlay) overlay.classList.remove('active');
      if (results) results.innerHTML = '';
      clearHighlights();
    }

    function clearHighlights() {
      currentHighlights.forEach(function(mark) {
        var p = mark.parentNode;
        if (p) { p.replaceChild(document.createTextNode(mark.textContent || ''), mark); p.normalize(); }
      });
      currentHighlights = [];
    }

    function highlightInDocument(keyword) {
      clearHighlights();
      if (!keyword || !keyword.trim()) return;
      var container = document.querySelector('.markdown-section');
      if (!container) return;

      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode: function(n) {
          if (!n.textContent || !n.textContent.trim()) return NodeFilter.FILTER_REJECT;
          var p = n.parentNode;
          if (!p) return NodeFilter.FILTER_REJECT;
          if (p.tagName === 'SCRIPT' || p.tagName === 'STYLE') return NodeFilter.FILTER_REJECT;
          if (p.closest && (p.closest('.search-modal') || p.closest('.code-copy-btn') || p.closest('#toc-panel'))) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      var nodes = [], n;
      while ((n = walker.nextNode())) nodes.push(n);
      if (!nodes.length) return;

      var esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), regex = new RegExp(esc, 'gi');
      nodes.forEach(function(tn) {
        var text = tn.textContent; regex.lastIndex = 0;
        var frag = document.createDocumentFragment(), last = 0, match, hit = false;
        while ((match = regex.exec(text)) !== null) {
          hit = true;
          if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
          var mk = document.createElement('mark'); mk.className = 'search-highlight'; mk.textContent = match[0];
          frag.appendChild(mk); currentHighlights.push(mk); last = regex.lastIndex;
          if (match[0].length === 0) { regex.lastIndex++; if (regex.lastIndex > text.length) break; }
        }
        if (hit && last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        if (hit && frag.childNodes.length) tn.parentNode.replaceChild(frag, tn);
      });
    }

    function generateSearchResults(keyword) {
      var results = document.getElementById('searchResults');
      if (!results) return;
      results.innerHTML = '';
      if (!keyword || !keyword.trim()) return;

      var container = document.querySelector('.markdown-section');
      if (!container) { results.innerHTML = '<div class="search-no-results">暂无内容</div>'; return; }

      var blocks = container.querySelectorAll('p, li, td, th, h1, h2, h3, h4, h5, h6');
      var esc = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), regex = new RegExp(esc, 'gi'), seen = new Set(), count = 0;

      blocks.forEach(function(block) {
        if (block.closest('pre') || block.closest('.code-block-wrapper') || block.closest('#toc-panel')) return;
        if (seen.has(block)) return;
        var text = block.textContent || ''; regex.lastIndex = 0;
        if (!regex.test(text)) return;
        seen.add(block); count++;
        regex.lastIndex = 0;
        var match = regex.exec(text), idx = match ? match.index : 0, len = match ? match[0].length : 0;
        var start = Math.max(0, idx - 40), end = Math.min(text.length, idx + len + 40);
        var excerpt = (start > 0 ? '…' : '') + text.substring(start, end) + (end < text.length ? '…' : '');

        var div = document.createElement('div'); div.className = 'search-result-item';
        var heading = block.closest('h1, h2, h3, h4, h5, h6') || findPreviousHeading(block);
        if (heading && heading !== block) {
          div.innerHTML = '<div class="search-result-title">' + heading.textContent.trim() + '</div>' + excerpt.replace(new RegExp(esc, 'gi'), '<mark>$&</mark>');
        } else {
          div.innerHTML = excerpt.replace(new RegExp(esc, 'gi'), '<mark>$&</mark>');
        }
        div.addEventListener('click', function() { closeSearchModal(); block.scrollIntoView({ behavior: 'smooth', block: 'center' }); });
        results.appendChild(div);
      });
      if (count === 0) results.innerHTML = '<div class="search-no-results">未找到匹配内容</div>';
    }

    function findPreviousHeading(el) {
      var prev = el.previousElementSibling;
      while (prev) { if (/^H[1-6]$/.test(prev.tagName)) return prev; prev = prev.previousElementSibling; }
      return null;
    }

    // ============================================================
    // 加载动画 3D 鼠标交互
    // ============================================================
    function initLoaderMouse() {
      var wrapper = document.getElementById('loaderWrapper');
      var triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;
      var baseFilter = 'drop-shadow(0 0 8px rgba(255,255,255,0.1)) drop-shadow(0 0 2px rgba(0,0,0,0.2))';
      function handleMouse(e) {
        var dx = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
        var dy = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
        wrapper.style.transform = 'rotateX(' + (-dy * 8) + 'deg) rotateY(' + (dx * 8) + 'deg) translateZ(12px)';
        triangle.style.filter = baseFilter + ' drop-shadow(' + (dx * 6) + 'px ' + (dy * 6) + 'px 6px rgba(0,0,0,0.3))';
      }
      document.addEventListener('mousemove', handleMouse);
      window._loaderMouse = handleMouse;
    }

    // ============================================================
    // MathJax
    // ============================================================
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']], processEscapes: true },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'], ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
    };
  </script>
