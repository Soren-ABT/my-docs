<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS 变量
       ============================================================ */
    :root {
      --bg: #fff; --bg-secondary: #f5f5f5; --bg-tertiary: #fafafa;
      --text: #333; --text-secondary: #666; --text-muted: #999;
      --border: #e0e0e0; --border-light: rgba(0,0,0,0.06);
      --shadow: rgba(0,0,0,0.06); --shadow-lg: rgba(0,0,0,0.12);
      --accent: #666; --accent-light: rgba(0,0,0,0.06);
      --code-bg: #f8f9fa; --code-border: rgba(0,0,0,0.06);
      --header-bg: rgba(255,255,255,0.88);
      --sidebar-bg: #f7f7f7; --sidebar-active: rgba(0,0,0,0.07);
      --sidebar-hover: rgba(0,0,0,0.04); --folder-open-bg: rgba(0,0,0,0.03);
      --folder-open-border: #bbb;
      --progress-color: #27ae60; --progress-color-end: #2ecc71;
      --modal-bg: #fff; --modal-overlay: rgba(0,0,0,0.25);
      --search-highlight: #c8e6c9; --search-selected: #e8f5e9;
      --btn-hover: rgba(0,0,0,0.06); --toc-bg: rgba(255,255,255,0.95);
      --scrollbar-thumb: #c0c0c0; --scrollbar-track: transparent;
      --toast-bg: #333; --toast-text: #fff;
      --loader-blur-bg: rgba(255,255,255,0.15);
      --loader-tri-stroke: #888;
      --loader-tri-fill: #f1c40f;
      --loader-text: #888;
      --toc-link: #27ae60; --toc-link-hover: #2ecc71;
      --line-number: #999; --line-number-bg: rgba(0,0,0,0.02);
      --lightbox-bg: rgba(0,0,0,0.88);
    }
    body.dark {
      --bg: #1a1a2e; --bg-secondary: #16213e; --bg-tertiary: #0f3460;
      --text: #e0e0e0; --text-secondary: #b0b0b0; --text-muted: #777;
      --border: #2a2a4a; --border-light: rgba(255,255,255,0.06);
      --shadow: rgba(0,0,0,0.3); --shadow-lg: rgba(0,0,0,0.5);
      --accent: #aaa; --accent-light: rgba(255,255,255,0.06);
      --code-bg: #0d1b2a; --code-border: #1b2838;
      --header-bg: rgba(26,26,46,0.9);
      --sidebar-bg: #141d2b; --sidebar-active: rgba(255,255,255,0.07);
      --sidebar-hover: rgba(255,255,255,0.04); --folder-open-bg: rgba(255,255,255,0.03);
      --folder-open-border: #555;
      --progress-color: #27ae60; --progress-color-end: #2ecc71;
      --modal-bg: #16213e; --modal-overlay: rgba(0,0,0,0.6);
      --search-highlight: #3d5a1e; --search-selected: #2a3a1e;
      --btn-hover: rgba(255,255,255,0.08); --toc-bg: rgba(26,26,46,0.95);
      --scrollbar-thumb: #3a3a5a; --scrollbar-track: #1a1a2e;
      --toast-bg: #e0e0e0; --toast-text: #1a1a2e;
      --loader-blur-bg: rgba(26,26,46,0.15);
      --loader-tri-stroke: #999;
      --loader-tri-fill: #f1c40f;
      --loader-text: #999;
      --toc-link: #2ecc71; --toc-link-hover: #58d68d;
      --line-number: #666; --line-number-bg: rgba(255,255,255,0.02);
      --lightbox-bg: rgba(0,0,0,0.92);
    }

    /* ============================================================
       防闪烁 —— 初始化时冻结所有过渡
       ============================================================ */
    .no-transition,
    .no-transition *,
    .no-transition *::before,
    .no-transition *::after {
      transition: none !important;
      animation: none !important;
    }

    /* ============================================================
       全局
       ============================================================ */
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); margin: 0; padding: 0;
      transition: background 0.3s, color 0.3s; scroll-behavior: smooth;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ============================================================
       毛玻璃加载遮罩
       ============================================================ */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--loader-blur-bg);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.45s ease; perspective: 700px;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .loader-wrapper {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d;
    }
    .loader-triangle {
      width: 100px; height: 100px; margin-bottom: 1.6rem;
      transform-style: preserve-3d;
      filter: drop-shadow(0 0 4px rgba(0,0,0,0.15)) drop-shadow(0 0 1px rgba(0,0,0,0.3));
    }
    .loader-triangle svg { width: 100%; height: 100%; }
    .loader-triangle .tri-bg { fill: none; stroke: var(--loader-tri-stroke); stroke-width: 6; stroke-linejoin: round; opacity: 0.65; }
    .loader-triangle .tri-progress {
      fill: none; stroke: var(--loader-tri-fill); stroke-width: 7;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 10 110;
      animation: dashRhythm 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
    }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text { color: var(--loader-text); font-size: 0.85rem; letter-spacing: 2.5px; font-weight: 400; }
    .loading-error { display: none; margin-top: 1rem; font-size: 0.76rem; color: #c0392b; text-align: center; max-width: 300px; line-height: 1.6; }
    .loading-error.show { display: block; }

    /* ============================================================
       阅读进度条
       ============================================================ */
    #reading-progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--progress-color), var(--progress-color-end));
      z-index: 10000; transition: width 0.12s linear;
      border-radius: 0 2px 2px 0; pointer-events: none;
    }

    /* ============================================================
       Toast 通知
       ============================================================ */
    #toast-container {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 10050; display: flex; flex-direction: column-reverse;
      align-items: center; gap: 8px; pointer-events: none;
    }
    .toast {
      padding: 10px 22px; border-radius: 20px;
      background: var(--toast-bg); color: var(--toast-text);
      font-size: 0.85rem; font-weight: 500;
      box-shadow: 0 8px 28px var(--shadow-lg); pointer-events: auto;
      animation: toastIn 0.35s cubic-bezier(0.22,0.61,0.36,1),
                 toastOut 0.3s 2s cubic-bezier(0.55,0.06,0.68,0.19) forwards;
    }
    .toast.success { border-left: 3px solid #27ae60; }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn  { 0%{opacity:0;transform:translateY(16px) scale(0.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes toastOut { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-8px) scale(0.9)} }

    /* ============================================================
       侧边栏
       ============================================================ */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: 2px 0 12px var(--shadow) !important;
      width: 260px !important;
      transition: transform 0.35s cubic-bezier(0.45,0.05,0.55,0.95) !important;
      will-change: transform;
    }
    .sidebar.close { transform: translateX(-100%); }
    .sidebar-toggle { display: none !important; }

    .sidebar-header {
      display: flex; align-items: center; padding: 12px 12px;
      border-bottom: 1px solid var(--border); gap: 6px; background: var(--sidebar-bg);
    }
    .sidebar-brand { font-size: 1rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input {
      flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: 0.8rem; outline: none; display: none;
      min-width: 0; transition: border 0.2s;
    }
    .sidebar-filter-input:focus { border-color: var(--accent); }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: background 0.18s, color 0.18s; color: var(--text-secondary); flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--btn-hover); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* ============================================================
       侧边栏导航
       ============================================================ */
    .sidebar-nav { padding: 6px 0; }
    .sidebar-nav > ul { padding-left: 0; }
    .sidebar-nav li { list-style: none; margin: 0; }
    .sidebar-nav a {
      display: block; padding: 7px 14px; border-radius: 7px; margin: 1px 6px;
      color: var(--text); text-decoration: none; font-size: 0.88rem;
      transition: background 0.15s, color 0.15s, padding-left 0.2s;
    }
    .sidebar-nav a:hover { background: var(--sidebar-hover); }
    .sidebar-nav .active > a { background: var(--sidebar-active); font-weight: 500; color: var(--text); padding-left: 18px; }
    .sidebar-nav li.filtered-out { display: none !important; }

    .folder-item { display: flex !important; flex-wrap: wrap; align-items: center; margin: 1px 6px; }
    .folder-label {
      flex: 1 1 auto; display: flex !important; align-items: center; gap: 7px;
      padding: 7px 12px; border-radius: 7px;
      color: var(--text); cursor: pointer; font-size: 0.88rem;
      text-decoration: none; user-select: none; min-width: 0;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-label:hover { background: var(--sidebar-hover); }
    .folder-item.expanded > .folder-label { background: var(--folder-open-bg); color: var(--text); font-weight: 500; }
    .folder-arrow {
      flex-shrink: 0; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
      transition: transform 0.28s cubic-bezier(0.45,0.05,0.55,0.95); color: var(--text-muted);
    }
    .folder-item.expanded > .folder-label .folder-arrow { transform: rotate(90deg); }
    .folder-arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .folder-item > ul { flex-basis: 100%; width: 100%; }
    .sidebar-nav ul.sidebar-sub {
      padding-left: 6px; margin-left: 12px;
      max-height: 0; overflow: hidden; will-change: max-height;
      transition: max-height 0.32s cubic-bezier(0.45,0.05,0.55,0.95);
      border-left: 1px solid transparent;
    }
    .sidebar-nav ul.sidebar-sub.expanded { max-height: 500px; border-left-color: var(--folder-open-border); }
    .sidebar-nav ul.sidebar-sub > li {
      opacity: 0; transform: translateX(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      will-change: opacity, transform;
    }
    .sidebar-nav ul.sidebar-sub.expanded > li { opacity: 1; transform: translateX(0); }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(1) { transition-delay: 0.03s; }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(2) { transition-delay: 0.06s; }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(3) { transition-delay: 0.09s; }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(4) { transition-delay: 0.12s; }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(5) { transition-delay: 0.15s; }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(n+6) { transition-delay: 0.17s; }
    .sidebar-nav ul.sidebar-sub li a { font-size: 0.84rem; padding: 5px 11px; margin: 1px 4px; }

    /* ============================================================
       标题锚点按钮
       ============================================================ */
    .heading-anchor {
      display: inline-block; opacity: 0; margin-left: 4px;
      color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
      transition: opacity 0.2s, transform 0.2s; vertical-align: middle; user-select: none;
    }
    .markdown-section h1:hover .heading-anchor,
    .markdown-section h2:hover .heading-anchor,
    .markdown-section h3:hover .heading-anchor,
    .markdown-section h4:hover .heading-anchor { opacity: 1; }
    .heading-anchor:hover { transform: scale(1.15); color: var(--text); }

    /* ============================================================
       文档固定抬头
       ============================================================ */
    .doc-header {
      position: fixed; top: 0; left: 260px; right: 0; height: 56px;
      background: var(--header-bg); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      display: none; align-items: center; padding: 0 20px; z-index: 999;
      transition: left 0.35s cubic-bezier(0.45,0.05,0.55,0.95), background 0.3s;
    }
    body.close .doc-header { left: 0; }
    .doc-header-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .doc-title { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-reading-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; margin-left: 4px; }
    .doc-header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    .capsule {
      display: none; align-items: center; background: var(--header-bg);
      backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px;
      padding: 4px 6px; gap: 2px; position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); z-index: 1000; box-shadow: 0 2px 8px var(--shadow);
    }
    body.close .capsule { display: flex; }
    body.close .doc-header-left { padding-left: 68px; }
    .capsule .icon-btn { width: 28px; height: 28px; border-radius: 50%; }
    #darkModeBtn .sun-icon, #darkModeBtn .moon-icon { transition: transform 0.4s; }
    body:not(.dark) #darkModeBtn .moon-icon { display: none; }
    body.dark #darkModeBtn .sun-icon { display: none; }

    /* ============================================================
       回到顶部 + 百分比
       ============================================================ */
    #backToTop {
      position: fixed; bottom: 28px; right: 28px; z-index: 998;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px var(--shadow-lg);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s; pointer-events: none;
      font-size: 0.65rem; font-weight: 600; font-family: 'JetBrains Mono', monospace;
    }
    body.dark #backToTop { color: #1a1a2e; }
    #backToTop.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #backToTop:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow-lg); }
    #backToTop svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    #backToTop::before {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      background: conic-gradient(var(--progress-color) var(--scroll-pct, 0%), transparent var(--scroll-pct, 0%));
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 3px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 3px));
      opacity: 0.55;
    }

    /* ============================================================
       TOC 面板
       ============================================================ */
    #toc-panel {
      position: fixed; right: 16px; top: 80px; z-index: 997;
      background: var(--toc-bg); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; max-width: 240px; max-height: 60vh;
      overflow-y: auto; font-size: 0.8rem;
      box-shadow: 0 8px 24px var(--shadow);
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0; transform: translateX(20px); pointer-events: none;
    }
    #toc-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #toc-panel .toc-title { font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.5px; }
    #toc-panel a {
      display: block; padding: 4px 0;
      color: var(--toc-link); text-decoration: none;
      border-left: 2px solid transparent; padding-left: 8px;
      transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #toc-panel a:hover, #toc-panel a.active { color: var(--toc-link-hover); border-left-color: var(--toc-link); }
    #toc-panel a.toc-h2 { padding-left: 8px; font-weight: 500; }
    #toc-panel a.toc-h3 { padding-left: 18px; font-size: 0.75rem; }
    #toc-panel a.toc-h4 { padding-left: 28px; font-size: 0.72rem; }
    #tocToggleBtn.active { color: var(--text); }

    /* ============================================================
       搜索模态
       ============================================================ */
    .search-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay); backdrop-filter: blur(6px);
      z-index: 10001; display: none; align-items: flex-start; justify-content: center; padding-top: 10vh;
    }
    .search-modal-overlay.active { display: flex; }
    .search-modal {
      background: var(--modal-bg); border-radius: 18px; width: 90%; max-width: 580px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.3); overflow: hidden;
      display: flex; flex-direction: column; max-height: 70vh; border: 1px solid var(--border);
    }
    .search-modal-header { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .search-modal-header .search-icon { color: var(--text-muted); margin-right: 10px; flex-shrink: 0; }
    .search-modal-input { flex: 1; border: none; outline: none; font-size: 1.05rem; padding: 8px 0; background: transparent; color: var(--text); }
    .search-modal-input::placeholder { color: var(--text-muted); }
    .search-modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 50%; }
    .search-modal-close:hover { background: var(--btn-hover); color: var(--text); }
    .search-results { overflow-y: auto; flex: 1; padding: 8px 0; }
    .search-result-item { padding: 11px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light); color: var(--text); font-size: 0.88rem; line-height: 1.5; transition: background 0.15s; }
    .search-result-item:hover { background: var(--btn-hover); }
    .search-result-item.selected { background: var(--search-selected); border-left: 3px solid var(--accent); }
    .search-result-item mark { background: var(--search-highlight); border-radius: 2px; color: var(--text); }
    .search-no-results { padding: 28px; text-align: center; color: var(--text-muted); }
    .search-result-title { font-weight: 600; margin-bottom: 3px; }
    .search-hint { padding: 7px 18px; font-size: 0.72rem; color: var(--text-muted); border-bottom: 1px solid var(--border-light); }

    /* ============================================================
       快捷键面板
       ============================================================ */
    #shortcuts-panel {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay); backdrop-filter: blur(4px);
      z-index: 10002; display: none; align-items: center; justify-content: center;
    }
    #shortcuts-panel.active { display: flex; }
    .shortcuts-modal { background: var(--modal-bg); border-radius: 16px; padding: 24px 28px; max-width: 400px; width: 90%; box-shadow: 0 18px 45px rgba(0,0,0,0.3); border: 1px solid var(--border); }
    .shortcuts-modal h3 { margin: 0 0 14px; font-size: 1.05rem; color: var(--text); }
    .shortcuts-modal .kbd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border-light); font-size: 0.84rem; color: var(--text-secondary); }
    .shortcuts-modal .kbd-row:last-child { border-bottom: none; }
    .shortcuts-modal kbd { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 0.73rem; font-family: 'JetBrains Mono', monospace; color: var(--accent); }

    /* ============================================================
       代码块 + 行号 + Prism
       ============================================================ */
    .code-block-wrapper {
      margin: 1.6rem 0; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 10px var(--shadow); background: var(--code-bg); border: 1px solid var(--code-border);
      position: relative;
    }
    .code-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1.2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--code-border); }
    .code-lang { font-weight: 600; text-transform: uppercase; font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.4px; }
    .code-copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 11px; border-radius: 6px; font-size: 0.73rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .code-copy-btn:hover { background: var(--btn-hover); border-color: var(--accent); color: var(--text); }
    .code-copy-btn.copied { background: #27ae60; border-color: #27ae60; color: #fff; }
    .code-block-wrapper pre { margin: 0; padding: 1.2rem 0; overflow-x: auto; background: transparent !important; display: flex; }
    .code-block-wrapper pre code {
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      font-size: 0.86rem; line-height: 1.7; padding: 0 1.4rem; flex: 1;
      display: block;
    }
    /* 行号列 */
    .code-line-numbers {
      flex-shrink: 0; padding: 1.2rem 0; user-select: none;
      background: var(--line-number-bg); border-right: 1px solid var(--code-border);
    }
    .code-line-numbers span {
      display: block; font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; line-height: 1.7; color: var(--line-number);
      text-align: right; padding: 0 12px 0 14px; min-width: 3.5rem;
    }

    /* Prism light */
    .markdown-section .token.comment,.markdown-section .token.prolog,.markdown-section .token.doctype,.markdown-section .token.cdata{color:#6a737d;font-style:italic}
    .markdown-section .token.punctuation{color:#393a34}
    .markdown-section .token.property,.markdown-section .token.tag,.markdown-section .token.boolean,.markdown-section .token.number,.markdown-section .token.constant,.markdown-section .token.symbol,.markdown-section .token.deleted{color:#005cc5}
    .markdown-section .token.selector,.markdown-section .token.attr-name,.markdown-section .token.string,.markdown-section .token.char,.markdown-section .token.builtin,.markdown-section .token.inserted{color:#032f62}
    .markdown-section .token.operator,.markdown-section .token.entity,.markdown-section .token.url{color:#d73a49}
    .markdown-section .token.atrule,.markdown-section .token.attr-value,.markdown-section .token.keyword{color:#d73a49}
    .markdown-section .token.function,.markdown-section .token.class-name{color:#6f42c1}
    .markdown-section .token.regex,.markdown-section .token.important,.markdown-section .token.variable{color:#e36209}
    .markdown-section .token.important,.markdown-section .token.bold{font-weight:600}
    .markdown-section .token.italic{font-style:italic}

    /* Prism dark */
    body.dark .markdown-section .token.comment,body.dark .markdown-section .token.prolog,body.dark .markdown-section .token.doctype,body.dark .markdown-section .token.cdata{color:#6a9955;font-style:italic}
    body.dark .markdown-section .token.punctuation{color:#d4d4d4}
    body.dark .markdown-section .token.property,body.dark .markdown-section .token.tag,body.dark .markdown-section .token.boolean,body.dark .markdown-section .token.number,body.dark .markdown-section .token.constant,body.dark .markdown-section .token.symbol,body.dark .markdown-section .token.deleted{color:#b5cea8}
    body.dark .markdown-section .token.selector,body.dark .markdown-section .token.attr-name,body.dark .markdown-section .token.string,body.dark .markdown-section .token.char,body.dark .markdown-section .token.builtin,body.dark .markdown-section .token.inserted{color:#ce9178}
    body.dark .markdown-section .token.operator,body.dark .markdown-section .token.entity,body.dark .markdown-section .token.url{color:#569cd6}
    body.dark .markdown-section .token.atrule,body.dark .markdown-section .token.attr-value,body.dark .markdown-section .token.keyword{color:#569cd6}
    body.dark .markdown-section .token.function,body.dark .markdown-section .token.class-name{color:#dcdcaa}
    body.dark .markdown-section .token.regex,body.dark .markdown-section .token.important,body.dark .markdown-section .token.variable{color:#e36209}
    body.dark .code-block-wrapper pre code{color:#d4d4d4}
    .markdown-section a{color:var(--accent)}
    body.dark .markdown-section a{color:#ccc}

    /* ============================================================
       图片灯箱
       ============================================================ */
    #img-lightbox {
      position: fixed; inset: 0; z-index: 10050;
      background: var(--lightbox-bg); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out; animation: lbFadeIn 0.25s ease;
    }
    #img-lightbox.active { display: flex; }
    #img-lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 6px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); cursor: default; }
    #img-lightbox .lb-close {
      position: absolute; top: 20px; right: 28px; z-index: 1;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; width: 40px; height: 40px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    #img-lightbox .lb-close:hover { background: rgba(255,255,255,0.2); }
    @keyframes lbFadeIn { from{opacity:0} to{opacity:1} }

    /* 文档图片可点击提示 */
    .markdown-section img { cursor: zoom-in; border-radius: 6px; transition: transform 0.15s; }
    .markdown-section img:hover { transform: scale(1.02); }

    /* ============================================================
       响应式
       ============================================================ */
    @media (max-width: 768px) {
      .sidebar { width: 100% !important; }
      .doc-header { left: 0 !important; }
      .markdown-section { padding: 72px 16px 40px !important; }
      #toc-panel { display: none !important; }
      #backToTop { bottom: 16px; right: 16px; }
      .search-modal { max-height: 85vh; border-radius: 14px; }
      .loader-triangle { width: 76px; height: 76px; }
    }
  </style>
</head>
<body>

  <div id="reading-progress"></div>
  <div id="toast-container"></div>

  <!-- ========== 加载遮罩 ========== -->
  <div id="loading">
    <div class="loader-wrapper" id="loaderWrapper">
      <div class="loader-triangle" id="loaderTriangle">
        <svg viewBox="0 0 100 100">
          <polygon class="tri-bg" points="50,10 91.7,80 8.3,80"/>
          <polygon class="tri-progress" points="50,10 91.7,80 8.3,80" pathLength="120"/>
        </svg>
      </div>
      <div class="loading-text">LOADING</div>
    </div>
    <div class="loading-error" id="loadingError">⚠ 加载时间较长<br>请检查目录结构及 basePath 配置</div>
  </div>

  <!-- ========== 文档抬头 ========== -->
  <div class="doc-header" id="docHeader">
    <div class="capsule" id="capsuleGroup">
      <button class="icon-btn" id="capsuleSidebarBtn" title="侧边栏 (Ctrl+B)"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <button class="icon-btn" id="capsuleSearchBtn" title="搜索 (Ctrl+K)"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>
    </div>
    <div class="doc-header-left">
      <span class="doc-title" id="docTitle">文档加载中…</span>
      <span class="doc-reading-time" id="readingTime"></span>
    </div>
    <div class="doc-header-actions">
      <button class="icon-btn" id="tocToggleBtn" title="本页目录"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
      <button class="icon-btn" id="darkModeBtn" title="暗色模式 (Ctrl+D)">
        <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <!-- ========== TOC ========== -->
  <div id="toc-panel"><div class="toc-title">📑 本页目录</div><div id="toc-content"></div></div>

  <!-- ========== 回到顶部 ========== -->
  <button id="backToTop" title="回到顶部 (Ctrl+↑)"><svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>

  <!-- ========== 图片灯箱 ========== -->
  <div id="img-lightbox"><button class="lb-close">&times;</button><img src="" alt="预览"></div>

  <!-- ========== 搜索 ========== -->
  <div class="search-modal-overlay" id="searchModalOverlay">
    <div class="search-modal">
      <div class="search-modal-header">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input type="text" class="search-modal-input" id="searchModalInput" placeholder="搜索文档… (Ctrl+K)">
        <button class="search-modal-close" id="searchModalClose"><svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="search-hint" id="searchHint">↑↓ 导航 &nbsp; Enter 跳转 &nbsp; Esc 关闭</div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- ========== 快捷键 ========== -->
  <div id="shortcuts-panel">
    <div class="shortcuts-modal">
      <h3>⌨ 键盘快捷键</h3>
      <div class="kbd-row"><span>全局搜索</span><span><kbd>Ctrl</kbd>+<kbd>K</kbd></span></div>
      <div class="kbd-row"><span>快速聚焦搜索</span><span><kbd>/</kbd></span></div>
      <div class="kbd-row"><span>切换侧边栏</span><span><kbd>Ctrl</kbd>+<kbd>B</kbd></span></div>
      <div class="kbd-row"><span>暗色模式</span><span><kbd>Ctrl</kbd>+<kbd>D</kbd></span></div>
      <div class="kbd-row"><span>回到顶部</span><span><kbd>Ctrl</kbd>+<kbd>↑</kbd></span></div>
      <div class="kbd-row"><span>关闭面板</span><span><kbd>Esc</kbd></span></div>
      <div class="kbd-row"><span>显示帮助</span><span><kbd>?</kbd></span></div>
    </div>
  </div>

  <div id="app"></div>

  <!-- ============================================================
       localStorage 容错
       ============================================================ -->
  <script>
    (function() {
      var mem = {};
      function blocked() { try { var k='__t__'; localStorage.setItem(k,'1'); localStorage.removeItem(k); return false; } catch(e) { return true; } }
      if (!blocked()) return;
      var s=Storage.prototype.setItem, g=Storage.prototype.getItem, r=Storage.prototype.removeItem, c=Storage.prototype.clear;
      Storage.prototype.setItem=function(k,v){try{s.call(this,k,v)}catch(e){mem[k]=String(v)}};
      Storage.prototype.getItem=function(k){try{return g.call(this,k)}catch(e){return k in mem?mem[k]:null}};
      Storage.prototype.removeItem=function(k){try{r.call(this,k)}catch(e){delete mem[k]}};
      Storage.prototype.clear=function(){try{c.call(this)}catch(e){mem={}}};
    })();
  </script>

  <!-- ============================================================
       Docsify 配置 & 全部插件
       ============================================================ -->
  <script>
    var DOCSIFY_BASE_PATH = '/my-docs/';

    window.$docsify = {
      name: 'Soren的知识库',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 0,
      basePath: DOCSIFY_BASE_PATH,
      homepage: 'README.md',
      notFoundPage: true,
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            hideLoading();
            injectSidebarHeader();
            bindGlobalEvents();
            initLightbox();
            initImageClickHandler();
            document.body.classList.remove('close');
            updateDocTitle();
            updateReadingTime();
            setTimeout(function() {
              initSidebarFolders();
              generateTOC();
              updateProgressBar();
              addHeadingAnchors();
              restoreReadingPosition();
              addLineNumbers();
            }, 250);
          });

          hook.doneEach(function() {
            saveReadingPosition();
            updateDocTitle();
            updateReadingTime();
            closeSearchModal();
            enhanceCodeBlocks();
            clearTOC();
            // ★ 在 doneEach 中先重置侧边栏所有展开状态，再重新初始化
            resetSidebarState();
            setTimeout(function() {
              initSidebarFolders();
              generateTOC();
              updateProgressBar();
              addHeadingAnchors();
              addLineNumbers();
              initImageClickHandler();
              // ★ 页面切换后尝试恢复阅读位置
              setTimeout(restoreReadingPosition, 300);
            }, 180);
            if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
              MathJax.typesetPromise();
            }
          });
        }
      ]
    };

    // ========== Toast ==========
    function showToast(msg, type) {
      type = type || 'info';
      var c = document.getElementById('toast-container'); if (!c) return;
      var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
      c.appendChild(t); setTimeout(function() { if (t.parentNode) t.remove(); }, 2400);
    }

    // ========== 硬朗 3D 三角形 ==========
    (function initLoader3D() {
      var wrapper = document.getElementById('loaderWrapper');
      var triangle = document.getElementById('loaderTriangle');
      if (!wrapper || !triangle) return;
      var maxAngle = 9;
      var baseShadow = 'drop-shadow(0 0 4px rgba(0,0,0,0.15)) drop-shadow(0 0 1px rgba(0,0,0,0.3))';
      function handleMouse(e) {
        if (_loaded) return;
        var dx = (e.clientX - window.innerWidth/2) / (window.innerWidth/2);
        var dy = (e.clientY - window.innerHeight/2) / (window.innerHeight/2);
        wrapper.style.transform = 'rotateX(' + (-dy*maxAngle) + 'deg) rotateY(' + (dx*maxAngle) + 'deg) translateZ(14px)';
        triangle.style.filter = baseShadow + ' drop-shadow(' + (dx*10) + 'px ' + (dy*10) + 'px 12px rgba(0,0,0,0.35))';
      }
      document.addEventListener('mousemove', handleMouse);
      window._loaderMouse = handleMouse;
    })();

    // ========== 加载遮罩 ==========
    var _loaded = false;
    function hideLoading() {
      if (_loaded) return; _loaded = true;
      var el = document.getElementById('loading'), dh = document.getElementById('docHeader');
      if (el) { el.classList.add('fade-out'); setTimeout(function() { if (el) el.style.display = 'none'; }, 450); }
      if (dh) dh.style.display = 'flex';
      if (window._loaderMouse) { document.removeEventListener('mousemove', window._loaderMouse); window._loaderMouse = null; }
    }
    setTimeout(function() { if (!_loaded) { var e = document.getElementById('loadingError'); if (e) e.classList.add('show'); } }, 5000);

    // ========== 侧边栏头部 ==========
    function injectSidebarHeader() {
      var sb = document.querySelector('.sidebar'); if (!sb || sb.querySelector('.sidebar-header')) return;
      var nav = sb.querySelector('.sidebar-nav'); if (!nav) return;
      var h = document.createElement('div'); h.className = 'sidebar-header';
      h.innerHTML =
        '<span class="sidebar-brand" id="sidebarBrand">📚 知识库总览</span>' +
        '<input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤…">' +
        '<div class="sidebar-actions">' +
          '<button class="icon-btn" id="sidebarSearchBtn" title="过滤侧边栏"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>' +
          '<button class="icon-btn" id="sidebarCloseBtn" title="关闭侧边栏"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>' +
        '</div>';
      sb.insertBefore(h, nav);
      bindSidebarButtons();
    }

    function bindSidebarButtons() {
      var closeBtn = document.getElementById('sidebarCloseBtn');
      var searchBtn = document.getElementById('sidebarSearchBtn');
      var fi = document.getElementById('sidebarFilterInput');
      var brand = document.getElementById('sidebarBrand');
      if (closeBtn) closeBtn.addEventListener('click', function() { document.body.classList.add('close'); });
      if (searchBtn && fi && brand) {
        searchBtn.addEventListener('click', function() {
          if (fi.classList.contains('show')) { fi.classList.remove('show'); brand.classList.remove('hidden'); fi.value=''; filterSidebarItems(''); }
          else { fi.classList.add('show'); brand.classList.add('hidden'); fi.focus(); }
        });
      }
      if (fi) {
        fi.addEventListener('input', function() { filterSidebarItems(this.value); });
        fi.addEventListener('keydown', function(e) { if (e.key==='Escape') { this.value=''; filterSidebarItems(''); this.classList.remove('show'); if (brand) brand.classList.remove('hidden'); } });
      }
    }

    // ========== 全局事件 ==========
    function bindGlobalEvents() {
      var cb1 = document.getElementById('capsuleSidebarBtn'), cb2 = document.getElementById('capsuleSearchBtn');
      if (cb1) cb1.addEventListener('click', function() { document.body.classList.remove('close'); });
      if (cb2) cb2.addEventListener('click', openSearchModal);

      var dm = document.getElementById('darkModeBtn');
      if (dm) { dm.addEventListener('click', toggleDarkMode); if (localStorage.getItem('darkMode')==='true') document.body.classList.add('dark'); }

      var tocBtn = document.getElementById('tocToggleBtn'), tocPanel = document.getElementById('toc-panel');
      if (tocBtn && tocPanel) tocBtn.addEventListener('click', function() { tocPanel.classList.toggle('visible'); tocBtn.classList.toggle('active'); });

      var btt = document.getElementById('backToTop');
      if (btt) btt.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

      window.addEventListener('scroll', function() {
        updateProgressBar();
        if (btt) {
          btt.classList.toggle('visible', window.scrollY > 400);
          var dh = document.documentElement.scrollHeight - window.innerHeight;
          var sct = dh > 0 ? Math.min(100, Math.round((window.scrollY / dh) * 100)) : 0;
          btt.style.setProperty('--scroll-pct', sct + '%');
          // ★ 按钮内显示百分比
          btt.setAttribute('data-pct', sct);
        }
        updateTOCHighlight();
      });

      // ★ 滚动时保存阅读位置
      var scrollTimer;
      window.addEventListener('scroll', function() {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(saveReadingPosition, 500);
      });

      var closeBtn = document.getElementById('searchModalClose'), overlay = document.getElementById('searchModalOverlay');
      if (closeBtn) closeBtn.addEventListener('click', closeSearchModal);
      if (overlay) overlay.addEventListener('click', function(e) { if (e.target===overlay) closeSearchModal(); });

      var si = document.getElementById('searchModalInput');
      if (si) { si.addEventListener('input', function() { highlightInDocument(this.value); generateSearchResults(this.value); _searchSelectedIdx = -1; }); si.addEventListener('keydown', handleSearchKeyboard); }

      document.addEventListener('keydown', handleGlobalShortcuts);
    }

    // ========== 暗色模式 ==========
    function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }

    // ========== 快捷键 ==========
    function handleGlobalShortcuts(e) {
      var tag = (e.target.tagName || '').toLowerCase();
      var isInput = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
      if (e.key === 'Escape') { closeSearchModal(); closeShortcutsPanel(); var tp = document.getElementById('toc-panel'); if (tp) tp.classList.remove('visible'); var tb = document.getElementById('tocToggleBtn'); if (tb) tb.classList.remove('active'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearchModal(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); document.body.classList.toggle('close'); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); toggleDarkMode(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'ArrowUp') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      // ★ / 键快速聚焦搜索
      if (e.key === '/' && !isInput) { e.preventDefault(); openSearchModal(); return; }
      if (e.key === '?' && !isInput) { e.preventDefault(); openShortcutsPanel(); return; }
    }
    function openShortcutsPanel() { var p = document.getElementById('shortcuts-panel'); if (p) p.classList.add('active'); }
    function closeShortcutsPanel() { var p = document.getElementById('shortcuts-panel'); if (p) p.classList.remove('active'); }

    // ========== 搜索键盘导航 ==========
    var _searchSelectedIdx = -1;
    function handleSearchKeyboard(e) {
      var items = document.querySelectorAll('.search-result-item'); if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); _searchSelectedIdx = Math.min(_searchSelectedIdx+1, items.length-1); updateSearchSelection(items); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); _searchSelectedIdx = Math.max(_searchSelectedIdx-1, 0); updateSearchSelection(items); }
      else if (e.key === 'Enter') { e.preventDefault(); if (_searchSelectedIdx>=0 && items[_searchSelectedIdx]) items[_searchSelectedIdx].click(); }
    }
    function updateSearchSelection(items) { items.forEach(function(item,i) { item.classList.toggle('selected', i===_searchSelectedIdx); if (i===_searchSelectedIdx) item.scrollIntoView({block:'nearest'}); }); }

    // ========== 进度条 ==========
    function updateProgressBar() {
      var bar = document.getElementById('reading-progress'); if (!bar) return;
      var dh = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = dh <= 0 ? '0%' : Math.min(100, Math.max(0, (window.scrollY/dh)*100)) + '%';
    }

    // ========== 阅读时间 ==========
    function updateReadingTime() {
      var el = document.getElementById('readingTime'); if (!el) return;
      var container = document.querySelector('.markdown-section'); if (!container) { el.textContent=''; return; }
      var text = container.textContent || '';
      var words = text.replace(/\s+/g,' ').trim().split(/\s+/).length;
      var chinese = (text.match(/[\u4e00-\u9fff]/g)||[]).length;
      el.textContent = '⏱ ~' + Math.max(1, Math.ceil((words/200)+(chinese/400))) + ' min';
    }

    // ========== 标题锚点 ==========
    function addHeadingAnchors() {
      var container = document.querySelector('.markdown-section'); if (!container) return;
      container.querySelectorAll('h1,h2,h3,h4').forEach(function(h) {
        if (h.querySelector('.heading-anchor')) return;
        if (!h.id) h.id = 'h-'+Math.random().toString(36).substr(2,8);
        var a = document.createElement('a'); a.className='heading-anchor'; a.innerHTML='#'; a.title='复制链接'; a.href='javascript:void(0)';
        a.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation();
          var url = window.location.origin + window.location.pathname + '?id='+h.id+'#'+h.id;
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(function(){showToast('✓ 链接已复制','success');});
          else { var ta=document.createElement('textarea'); ta.value=url; ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('✓ 链接已复制','success'); }
        });

    }

    // ========== TOC ==========
    function generateTOC() {
      var container=document.querySelector('.markdown-section'), tocContent=document.getElementById('toc-content'), tocPanel=document.getElementById('toc-panel'), tocBtn=document.getElementById('tocToggleBtn');
      if (!container||!tocContent) return;
      var headings=container.querySelectorAll('h1,h2,h3,h4');
      if (headings.length<2) { if(tocPanel)tocPanel.classList.remove('visible'); if(tocBtn){tocBtn.classList.remove('active');tocBtn.style.display='none';} return; }
      if(tocBtn)tocBtn.style.display='';
      var html='';
      headings.forEach(function(h,i){ if(!h.id)h.id='toc-'+i; html+='<a href="#'+h.id+'" class="toc-'+h.tagName.toLowerCase()+'" data-target="'+h.id+'">'+h.textContent.trim()+'</a>'; });
      tocContent.innerHTML=html;
      tocContent.querySelectorAll('a').forEach(function(a){ a.addEventListener('click',function(e){ e.preventDefault(); var t=document.getElementById(a.getAttribute('data-target')); if(t)t.scrollIntoView({behavior:'smooth',block:'start'}); }); });
      updateTOCHighlight();
    }
    function updateTOCHighlight() {
      var links=document.querySelectorAll('#toc-content a'); if(!links.length)return;
      var st=window.scrollY+80, activeId=null;
      links.forEach(function(a){ var el=document.getElementById(a.getAttribute('data-target')); if(el&&el.offsetTop<=st)activeId=a.getAttribute('data-target'); });
      links.forEach(function(a){ a.classList.toggle('active',a.getAttribute('data-target')===activeId); });
    }
    function clearTOC() { var tc=document.getElementById('toc-content'); if(tc)tc.innerHTML=''; var tp=document.getElementById('toc-panel'); if(tp)tp.classList.remove('visible'); }

    // ========== 文档抬头标题 ==========
    function updateDocTitle() {
      var active=document.querySelector('.sidebar-nav .active'); var title='';
      if(active){ var link=active.querySelector(':scope > a'); title=(link||active).textContent.trim(); }
      if(!title){ var h1=document.querySelector('.markdown-section h1'); if(h1)title=h1.textContent.trim(); }
      if(!title&&window.location.hash) title=decodeURIComponent(window.location.hash.substring(1)).replace(/\?.*$/,'').replace(/-/g,' ');
      var el=document.getElementById('docTitle'); if(el)el.textContent=title||'文档';
    }

    // ========== 侧边栏过滤 ==========
    function filterSidebarItems(keyword) {
      var allLis=document.querySelectorAll('.sidebar-nav li'); if(!keyword||!keyword.trim()){ allLis.forEach(function(l){l.classList.remove('filtered-out');}); return; }
      var kw=keyword.trim().toLowerCase();
      allLis.forEach(function(li){
        var el=li.querySelector(':scope > a')||li.querySelector(':scope > .folder-label');
        var text=(el?el.textContent:li.textContent)||'';
        var childUl=li.querySelector('ul'), childMatch=false;
        if(childUl){ childUl.querySelectorAll('li').forEach(function(cli){ if((cli.textContent||'').toLowerCase().indexOf(kw)!==-1)childMatch=true; }); }
        if(text.toLowerCase().indexOf(kw)!==-1||childMatch){ li.classList.remove('filtered-out'); if(childMatch&&childUl&&!childUl.classList.contains('expanded')) expandFolder(li,childUl); }
        else{ li.classList.add('filtered-out'); }
      });
    }

    // ============================================================
    // ★ 侧边栏文件夹 —— 手风琴 + 防闪烁 + 状态重置
    // ============================================================
    var _currentOpenFolderUl = null;

    // ★ 在 doneEach 开始时重置侧边栏状态（收起所有展开的文件夹）
    function resetSidebarState() {
      var nav = document.querySelector('.sidebar-nav');
      if (!nav) return;
      // 冻结过渡
      nav.classList.add('no-transition');
      var allSubs = nav.querySelectorAll('ul.sidebar-sub.expanded');
      allSubs.forEach(function(ul) {
        ul.classList.remove('expanded');
        var parentLi = ul.parentNode;
        if (parentLi) parentLi.classList.remove('expanded');
      });
      _currentOpenFolderUl = null;
      // 下一帧解冻
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          nav.classList.remove('no-transition');
        });
      });
    }

    function initSidebarFolders() {
      var nav = document.querySelector('.sidebar-nav'); if (!nav) return;

      // ★ 防闪烁
      nav.classList.add('no-transition');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          nav.classList.remove('no-transition');
        });
      });

      // 如果已经初始化过，仅排序 + 展开 active 文件夹
      if (nav.querySelector('.folder-item')) {
        var allUls2 = nav.querySelectorAll('ul');
        allUls2.forEach(function(ul) {
          if (ul.parentNode === nav || ul.parentNode.classList.contains('sidebar-nav')) {
            ul.classList.remove('sidebar-sub', 'expanded');
          } else { ul.classList.add('sidebar-sub'); }
        });

        function sortList2(ul) {
          var items = Array.from(ul.children).filter(function(c){return c.tagName==='LI';});
          items.sort(function(a,b){
            var aD=!!a.querySelector('ul'), bD=!!b.querySelector('ul');
            if(aD&&!bD)return -1; if(!aD&&bD)return 1;
            return (a.textContent||'').trim().localeCompare((b.textContent||'').trim(),'en');
          });
          items.forEach(function(l){ul.appendChild(l);});
        }
        allUls2.forEach(sortList2);
        _currentOpenFolderUl = null;
        autoExpandActiveFolder();
        return;
      }

      // 标记子列表
      var allUls = nav.querySelectorAll('ul');
      allUls.forEach(function(ul) {
        if (ul.parentNode === nav || ul.parentNode.classList.contains('sidebar-nav')) {
          ul.classList.remove('sidebar-sub', 'expanded');
        } else { ul.classList.add('sidebar-sub'); }
      });

      function sortList(ul) {
        var items = Array.from(ul.children).filter(function(c){return c.tagName==='LI';});
        items.sort(function(a,b){
          var aD=!!a.querySelector('ul'), bD=!!b.querySelector('ul');
          if(aD&&!bD)return -1; if(!aD&&bD)return 1;
          return (a.textContent||'').trim().localeCompare((b.textContent||'').trim(),'en');
        });
        items.forEach(function(l){ul.appendChild(l);});
      }
      allUls.forEach(sortList);

      _currentOpenFolderUl = null;

      nav.querySelectorAll('li').forEach(function(li) {
        var childUl = li.querySelector('ul'); if (!childUl) return;
        li.classList.add('folder-item');

        var label = li.querySelector(':scope > .folder-label');
        if (!label) {
          var link = li.querySelector(':scope > a');
          if (link) { label = link; label.classList.add('folder-label'); label.setAttribute('href','javascript:void(0)'); label.removeAttribute('target'); }
          else {
            var folderName=''; var toRemove=[];
            for(var i=0;i<li.childNodes.length;i++){ var cn=li.childNodes[i]; if(cn.nodeType===3&&cn.textContent.trim()){ folderName+=cn.textContent.trim(); toRemove.push(cn); } }
            toRemove.forEach(function(n){li.removeChild(n);});
            label = document.createElement('span'); label.className='folder-label'; label.textContent=folderName||'Folder';
            li.insertBefore(label, li.firstChild);
          }
        }

        var arrow = label.querySelector('.folder-arrow');
        if (!arrow) { arrow = document.createElement('span'); arrow.className='folder-arrow'; arrow.innerHTML='<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'; label.appendChild(arrow); }

        label.onclick = function(e) {
          e.preventDefault(); e.stopPropagation();
          if (childUl.classList.contains('expanded')) { collapseFolder(li, childUl); }
          else { expandFolder(li, childUl); }
        };
      });

      autoExpandActiveFolder();
    }

    function expandFolder(li, childUl) {
      if (_currentOpenFolderUl && _currentOpenFolderUl !== childUl) {
        _currentOpenFolderUl.classList.remove('expanded');
        var prevLi = _currentOpenFolderUl.parentNode;
        if (prevLi) prevLi.classList.remove('expanded');
      }
      childUl.classList.add('expanded');
      li.classList.add('expanded');
      _currentOpenFolderUl = childUl;
    }

    function collapseFolder(li, childUl) {
      childUl.classList.remove('expanded');
      li.classList.remove('expanded');
      if (_currentOpenFolderUl === childUl) _currentOpenFolderUl = null;
    }

    function autoExpandActiveFolder() {
      var activeLink = document.querySelector('.sidebar-nav .active > a'); if (!activeLink) return;
      var parent = activeLink.closest('.folder-item');
      if (!parent) { var pu = activeLink.closest('ul.sidebar-sub'); if (pu) parent = pu.closest('.folder-item'); }
      if (parent) { var childUl = parent.querySelector(':scope > ul'); if (childUl) expandFolder(parent, childUl); }
    }

    // ============================================================
    // ★ 代码块增强 + 行号
    // ============================================================
    function addLineNumbers() {
      document.querySelectorAll('.code-block-wrapper pre').forEach(function(pre) {
        if (pre.querySelector('.code-line-numbers')) return;
        var code = pre.querySelector('code');
        if (!code) return;
        var text = code.textContent || '';
        var lines = text.split('\n');
        // 如果末行为空，移除
        if (lines.length > 1 && lines[lines.length-1].trim() === '') lines.pop();
        var lineNumbersHTML = '';
        for (var i = 0; i < lines.length; i++) {
          lineNumbersHTML += '<span>' + (i+1) + '</span>';
        }
        var lnDiv = document.createElement('div');
        lnDiv.className = 'code-line-numbers';
        lnDiv.innerHTML = lineNumbersHTML;
        pre.insertBefore(lnDiv, pre.firstChild);
      });
    }

    function enhanceCodeBlocks() {
      document.querySelectorAll('.markdown-section pre').forEach(function(pre) {
        if (pre.parentNode.classList.contains('code-block-wrapper')) return;
        var code = pre.querySelector('code'), lang = '';
        if (code && code.className) { var m = code.className.match(/lang(?:uage)?-(\w+)/); if (m) lang = m[1]; }

        var wrapper = document.createElement('div'); wrapper.className = 'code-block-wrapper';
        var toolbar = document.createElement('div'); toolbar.className = 'code-toolbar';
        toolbar.innerHTML = '<span class="code-lang">' + (lang || 'code') + '</span>';
        var btn = document.createElement('button'); btn.className = 'code-copy-btn';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
        btn.addEventListener('click', function() {
          var text = pre.textContent || '';
          var done = function() { btn.classList.add('copied'); btn.innerHTML = '✓ Copied'; showToast('✓ 代码已复制', 'success'); setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'; }, 2000); };
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
          else fallbackCopy(text, done);
        });
        toolbar.appendChild(btn); wrapper.appendChild(toolbar);
        pre.parentNode.insertBefore(wrapper, pre); wrapper.appendChild(pre);
      });
      function fallbackCopy(text, cb) { var ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); if(cb)cb(); }
    }

    // ============================================================
    // ★ 新功能 ①：阅读位置记忆
    // ============================================================
    function saveReadingPosition() {
      try {
        var pageKey = window.location.pathname + window.location.hash;
        var pos = { scrollY: window.scrollY, pageKey: pageKey, timestamp: Date.now() };
        localStorage.setItem('docsify_reading_pos', JSON.stringify(pos));
      } catch (e) {}
    }

    function restoreReadingPosition() {
      try {
        var raw = localStorage.getItem('docsify_reading_pos');
        if (!raw) return;
        var pos = JSON.parse(raw);
        var currentKey = window.location.pathname + window.location.hash;
        // 仅当 key 匹配时恢复
        if (pos.pageKey === currentKey && typeof pos.scrollY === 'number') {
          setTimeout(function() { window.scrollTo({ top: pos.scrollY, behavior: 'instant' }); }, 150);
        }
      } catch (e) {}
    }

    // ============================================================
    // ★ 新功能 ②：图片灯箱
    // ============================================================
    function initLightbox() {
      var lb = document.getElementById('img-lightbox');
      if (!lb) return;
      var lbImg = lb.querySelector('img');
      var lbClose = lb.querySelector('.lb-close');

      lb.addEventListener('click', function(e) {
        if (e.target === lb || e.target === lbClose) {
          lb.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      lbClose.addEventListener('click', function() {
        lb.classList.remove('active');
        document.body.style.overflow = '';
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && lb.classList.contains('active')) {
          lb.classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      window._lbImg = lbImg;
      window._lb = lb;
    }

    function initImageClickHandler() {
      document.querySelectorAll('.markdown-section img').forEach(function(img) {
        if (img.hasAttribute('data-lb')) return;
        img.setAttribute('data-lb', '1');
        img.addEventListener('click', function(e) {
          e.preventDefault();
          var lb = window._lb;
          var lbImg = window._lbImg;
          if (!lb || !lbImg) return;
          lbImg.src = img.src;
          lbImg.alt = img.alt || '';
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      });
    }

    // ========== 全文搜索 ==========
    var currentHighlights = [];
    function openSearchModal() {
      var overlay = document.getElementById('searchModalOverlay'), input = document.getElementById('searchModalInput'), results = document.getElementById('searchResults');
      if (!overlay) return; overlay.classList.add('active'); if (input) { input.value=''; input.focus(); } if (results) results.innerHTML=''; clearHighlights(); _searchSelectedIdx=-1;
    }
    function closeSearchModal() {
      var overlay = document.getElementById('searchModalOverlay'), results = document.getElementById('searchResults');
      if (overlay) overlay.classList.remove('active'); if (results) results.innerHTML=''; clearHighlights(); _searchSelectedIdx=-1;
    }
    function clearHighlights() {
      currentHighlights.forEach(function(mark){ var p=mark.parentNode; if(p){p.replaceChild(document.createTextNode(mark.textContent||''),mark);p.normalize();} });
      currentHighlights=[];
    }
    function highlightInDocument(keyword) {
      clearHighlights(); if(!keyword||!keyword.trim())return;
      var container=document.querySelector('.markdown-section'); if(!container)return;
      var walker=document.createTreeWalker(container,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
        if(!n.textContent||!n.textContent.trim())return NodeFilter.FILTER_REJECT;
        var p=n.parentNode; if(!p)return NodeFilter.FILTER_REJECT;
        if(p.tagName==='SCRIPT'||p.tagName==='STYLE')return NodeFilter.FILTER_REJECT;
        if(p.closest&&(p.closest('.search-modal')||p.closest('.code-copy-btn')||p.closest('#toc-panel')||p.closest('.heading-anchor')||p.closest('.code-line-numbers')))return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }});
      var nodes=[],n; while((n=walker.nextNode()))nodes.push(n);
      if(!nodes.length)return;
      var esc=keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),regex=new RegExp(esc,'gi');
      nodes.forEach(function(tn){
        var text=tn.textContent;regex.lastIndex=0;
        var frag=document.createDocumentFragment(),last=0,match,hit=false;
        while((match=regex.exec(text))!==null){
          hit=true;if(match.index>last)frag.appendChild(document.createTextNode(text.slice(last,match.index)));
          var mk=document.createElement('mark');mk.className='search-highlight';mk.textContent=match[0];
          frag.appendChild(mk);currentHighlights.push(mk);last=regex.lastIndex;
          if(match[0].length===0){regex.lastIndex++;if(regex.lastIndex>text.length)break;}
        }
        if(hit&&last<text.length)frag.appendChild(document.createTextNode(text.slice(last)));
        if(hit&&frag.childNodes.length)tn.parentNode.replaceChild(frag,tn);
      });
    }
    function generateSearchResults(keyword) {
      var results=document.getElementById('searchResults');if(!results)return;results.innerHTML='';
      if(!keyword||!keyword.trim())return;
      var container=document.querySelector('.markdown-section');if(!container){results.innerHTML='<div class="search-no-results">暂无内容</div>';return;}
      var blocks=container.querySelectorAll('p,li,td,th,h1,h2,h3,h4,h5,h6');
      var esc=keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),regex=new RegExp(esc,'gi'),seen=new Set(),count=0;
      blocks.forEach(function(block){
        if(block.closest('pre')||block.closest('.code-block-wrapper')||block.closest('#toc-panel')||block.closest('.heading-anchor')||block.closest('.code-line-numbers'))return;
        if(seen.has(block))return;
        var text=block.textContent||'';regex.lastIndex=0;if(!regex.test(text))return;
        seen.add(block);count++;regex.lastIndex=0;
        var match=regex.exec(text),idx=match?match.index:0,len=match?match[0].length:0;
        var start=Math.max(0,idx-40),end=Math.min(text.length,idx+len+40);
        var excerpt=(start>0?'…':'')+text.substring(start,end)+(end<text.length?'…':'');
        var div=document.createElement('div');div.className='search-result-item';
        var heading=block.closest('h1,h2,h3,h4,h5,h6')||findPreviousHeading(block);
        if(heading&&heading!==block)div.innerHTML='<div class="search-result-title">'+heading.textContent.trim()+'</div>'+excerpt.replace(new RegExp(esc,'gi'),'<mark>$&</mark>');
        else div.innerHTML=excerpt.replace(new RegExp(esc,'gi'),'<mark>$&</mark>');
        div.addEventListener('click',function(){closeSearchModal();block.scrollIntoView({behavior:'smooth',block:'center'});});
        results.appendChild(div);
      });
      if(count===0)results.innerHTML='<div class="search-no-results">未找到匹配内容</div>';
    }
    function findPreviousHeading(el){var prev=el.previousElementSibling;while(prev){if(/^H[1-6]$/.test(prev.tagName))return prev;prev=prev.previousElementSibling;}return null;}
