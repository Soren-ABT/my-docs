<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的知识库 - 文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       CSS 变量 —— 亮色 / 暗色（深度优化阅读舒适度）
       ============================================================ */
    :root {
      --bg: #fff; --bg-secondary: #f5f5f5; --bg-tertiary: #fafafa;
      --text: #333; --text-secondary: #666; --text-muted: #999;
      --border: #e0e0e0; --border-light: rgba(0,0,0,0.06);
      --shadow: rgba(0,0,0,0.06); --shadow-lg: rgba(0,0,0,0.12);
      --accent: #666; --accent-light: rgba(0,0,0,0.06);
      --code-bg: #f8f9fa; --code-border: rgba(0,0,0,0.06);
      --header-bg: rgba(255,255,255,0.88);
      --sidebar-bg: #f7f7f7; --sidebar-active: rgba(0,0,0,0.07);
      --sidebar-hover: rgba(0,0,0,0.04); --folder-open-bg: rgba(0,0,0,0.03);
      --folder-open-border: #bbb;
      --progress-color: #27ae60; --progress-color-end: #2ecc71;
      --modal-bg: #fff; --modal-overlay: rgba(0,0,0,0.25);
      --search-highlight: #c8e6c9; --search-selected: #e8f5e9;
      --btn-hover: rgba(0,0,0,0.06); --toc-bg: rgba(255,255,255,0.95);
      --scrollbar-thumb: #c0c0c0; --scrollbar-track: transparent;
      --toast-bg: #333; --toast-text: #fff;
      --loader-blur-bg: rgba(255,255,255,0.15);
      --loader-tri-stroke: #888;
      --loader-tri-fill: #f1c40f;
      --loader-text: #888;
      --toc-link: var(--text);
      --toc-link-hover: #27ae60;
      --heading-color: #27ae60;
      --line-number: #999; --line-number-bg: rgba(0,0,0,0.02);
      --lightbox-bg: rgba(0,0,0,0.88);
      --inline-code-bg: rgba(0,0,0,0.06);
      --inline-code-text: #c7254e;
      --table-stripe: rgba(0,0,0,0.025);
      --table-border: #e0e0e0;
      --blockquote-bg: rgba(0,0,0,0.02);
      --blockquote-border: #27ae60;
    }
    body.dark {
      --bg: #0d1117; --bg-secondary: #161b22; --bg-tertiary: #21262d;
      --text: #c9d1d9; --text-secondary: #8b949e; --text-muted: #6e7681;
      --border: #30363d; --border-light: rgba(255,255,255,0.06);
      --shadow: rgba(0,0,0,0.4); --shadow-lg: rgba(0,0,0,0.6);
      --accent: #8b949e; --accent-light: rgba(255,255,255,0.06);
      --code-bg: #161b22; --code-border: #30363d;
      --header-bg: rgba(13,17,23,0.92);
      --sidebar-bg: #0d1117; --sidebar-active: rgba(255,255,255,0.06);
      --sidebar-hover: rgba(255,255,255,0.04); --folder-open-bg: rgba(255,255,255,0.03);
      --folder-open-border: #30363d;
      --progress-color: #2ecc71; --progress-color-end: #27ae60;
      --modal-bg: #161b22; --modal-overlay: rgba(0,0,0,0.65);
      --search-highlight: #1b3a1b; --search-selected: #1a2e1a;
      --btn-hover: rgba(255,255,255,0.06); --toc-bg: rgba(13,17,23,0.95);
      --scrollbar-thumb: #30363d; --scrollbar-track: #0d1117;
      --toast-bg: #c9d1d9; --toast-text: #0d1117;
      --loader-blur-bg: rgba(13,17,23,0.15);
      --loader-tri-stroke: #8b949e;
      --loader-tri-fill: #f1c40f;
      --loader-text: #8b949e;
      --toc-link: var(--text);
      --toc-link-hover: #3fb950;
      --heading-color: #3fb950;
      --line-number: #484f58; --line-number-bg: rgba(255,255,255,0.02);
      --lightbox-bg: rgba(0,0,0,0.94);
      --inline-code-bg: rgba(255,255,255,0.08);
      --inline-code-text: #f0883e;
      --table-stripe: rgba(255,255,255,0.02);
      --table-border: #30363d;
      --blockquote-bg: rgba(255,255,255,0.01);
      --blockquote-border: #3fb950;
    }

    /* ============================================================
       防闪烁
       ============================================================ */
    .no-transition,
    .no-transition *,
    .no-transition *::before,
    .no-transition *::after {
      transition: none !important;
      animation: none !important;
    }

    /* ============================================================
       全局
       ============================================================ */
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); margin: 0; padding: 0;
      transition: background 0.3s, color 0.3s; scroll-behavior: smooth;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ============================================================
       毛玻璃加载
       ============================================================ */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--loader-blur-bg);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      z-index: 99999; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.45s ease; perspective: 700px;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .loader-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; transform-style: preserve-3d; }
    .loader-triangle { width: 100px; height: 100px; margin-bottom: 1.6rem; transform-style: preserve-3d; filter: drop-shadow(0 0 4px rgba(0,0,0,0.15)) drop-shadow(0 0 1px rgba(0,0,0,0.3)); }
    .loader-triangle svg { width: 100%; height: 100%; }
    .loader-triangle .tri-bg { fill: none; stroke: var(--loader-tri-stroke); stroke-width: 6; stroke-linejoin: round; opacity: 0.65; }
    .loader-triangle .tri-progress { fill: none; stroke: var(--loader-tri-fill); stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 110; animation: dashRhythm 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite; }
    @keyframes dashRhythm { 0% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: -120; } }
    .loading-text { color: var(--loader-text); font-size: 0.85rem; letter-spacing: 2.5px; font-weight: 400; }
    .loading-error { display: none; margin-top: 1rem; font-size: 0.76rem; color: #c0392b; text-align: center; max-width: 300px; line-height: 1.6; }
    .loading-error.show { display: block; }

    /* ============================================================
       阅读进度条
       ============================================================ */
    #reading-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--progress-color), var(--progress-color-end)); z-index: 10000; transition: width 0.12s linear; border-radius: 0 2px 2px 0; pointer-events: none; }

    /* ============================================================
       Toast
       ============================================================ */
    #toast-container { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10050; display: flex; flex-direction: column-reverse; align-items: center; gap: 8px; pointer-events: none; }
    .toast { padding: 10px 22px; border-radius: 20px; background: var(--toast-bg); color: var(--toast-text); font-size: 0.85rem; font-weight: 500; box-shadow: 0 8px 28px var(--shadow-lg); pointer-events: auto; animation: toastIn 0.35s cubic-bezier(0.22,0.61,0.36,1), toastOut 0.3s 2s cubic-bezier(0.55,0.06,0.68,0.19) forwards; }
    .toast.success { border-left: 3px solid #27ae60; }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn  { 0%{opacity:0;transform:translateY(16px) scale(0.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes toastOut { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-8px) scale(0.9)} }

    /* ============================================================
       侧边栏
       ============================================================ */
    .sidebar { background: var(--sidebar-bg) !important; border-right: 1px solid var(--border) !important; box-shadow: 2px 0 12px var(--shadow) !important; width: 260px !important; transition: transform 0.35s cubic-bezier(0.45,0.05,0.55,0.95) !important; will-change: transform; }
    .sidebar.close { transform: translateX(-100%); }
    .sidebar-toggle { display: none !important; }
    .sidebar-header { display: flex; align-items: center; padding: 12px 12px; border-bottom: 1px solid var(--border); gap: 6px; background: var(--sidebar-bg); }
    .sidebar-brand { font-size: 1rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .sidebar-brand.hidden { display: none; }
    .sidebar-filter-input { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.8rem; outline: none; display: none; min-width: 0; transition: border 0.2s; }
    .sidebar-filter-input:focus { border-color: var(--accent); }
    .sidebar-filter-input.show { display: block; }
    .sidebar-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.18s, color 0.18s; color: var(--text-secondary); flex-shrink: 0; }
    .icon-btn:hover { background: var(--btn-hover); color: var(--text); }
    .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* ============================================================
       侧边栏导航
       ============================================================ */
    .sidebar-nav { padding: 6px 0; }
    .sidebar-nav > ul { padding-left: 0; }
    .sidebar-nav li { list-style: none; margin: 0; }
    .sidebar-nav a { display: block; padding: 7px 14px; border-radius: 7px; margin: 1px 6px; color: var(--text); text-decoration: none; font-size: 0.88rem; transition: background 0.15s, color 0.15s, padding-left 0.2s; }
    .sidebar-nav a:hover { background: var(--sidebar-hover); }
    .sidebar-nav .active > a { background: var(--sidebar-active); font-weight: 500; color: var(--heading-color); padding-left: 18px; }
    .sidebar-nav li.filtered-out { display: none !important; }
    .folder-item { display: flex !important; flex-wrap: wrap; align-items: center; margin: 1px 6px; }
    .folder-label { flex: 1 1 auto; display: flex !important; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 7px; color: var(--text); cursor: pointer; font-size: 0.88rem; text-decoration: none; user-select: none; min-width: 0; transition: background 0.18s, color 0.18s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .folder-label:hover { background: var(--sidebar-hover); }
    .folder-item.expanded > .folder-label { background: var(--folder-open-bg); color: var(--text); font-weight: 500; }
    .folder-arrow { flex-shrink: 0; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; transition: transform 0.28s cubic-bezier(0.45,0.05,0.55,0.95); color: var(--text-muted); }
    .folder-item.expanded > .folder-label .folder-arrow { transform: rotate(90deg); }
    .folder-arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .folder-item > ul { flex-basis: 100%; width: 100%; }
    .sidebar-nav ul.sidebar-sub { padding-left: 6px; margin-left: 12px; max-height: 0; overflow: hidden; will-change: max-height; transition: max-height 0.32s cubic-bezier(0.45,0.05,0.55,0.95); border-left: 1px solid transparent; }
    .sidebar-nav ul.sidebar-sub.expanded { max-height: 500px; border-left-color: var(--folder-open-border); }
    .sidebar-nav ul.sidebar-sub > li { opacity: 0; transform: translateX(-6px); transition: opacity 0.25s ease, transform 0.25s ease; will-change: opacity, transform; }
    .sidebar-nav ul.sidebar-sub.expanded > li { opacity: 1; transform: translateX(0); }
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(1){transition-delay:0.03s}
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(2){transition-delay:0.06s}
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(3){transition-delay:0.09s}
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(4){transition-delay:0.12s}
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(5){transition-delay:0.15s}
    .sidebar-nav ul.sidebar-sub.expanded > li:nth-child(n+6){transition-delay:0.17s}
    .sidebar-nav ul.sidebar-sub li a { font-size: 0.84rem; padding: 5px 11px; margin: 1px 4px; }

    /* ============================================================
       标题锚点
       ============================================================ */
    .heading-anchor { display: inline-block; opacity: 0; margin-left: 4px; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; transition: opacity 0.2s, transform 0.2s; vertical-align: middle; user-select: none; }
    .markdown-section h1:hover .heading-anchor,
    .markdown-section h2:hover .heading-anchor,
    .markdown-section h3:hover .heading-anchor,
    .markdown-section h4:hover .heading-anchor { opacity: 1; }
    .heading-anchor:hover { transform: scale(1.15); color: var(--text); }

    /* ============================================================
       文档抬头
       ============================================================ */
    .doc-header { position: fixed; top: 0; left: 260px; right: 0; height: 56px; background: var(--header-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); display: none; align-items: center; padding: 0 20px; z-index: 999; transition: left 0.35s cubic-bezier(0.45,0.05,0.55,0.95), background 0.3s; }
    body.close .doc-header { left: 0; }
    .doc-header-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
    .doc-title { font-size: 15px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-reading-time { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; margin-left: 4px; }
    .doc-header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .capsule { display: none; align-items: center; background: var(--header-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 24px; padding: 4px 6px; gap: 2px; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); z-index: 1000; box-shadow: 0 2px 8px var(--shadow); }
    body.close .capsule { display: flex; }
    body.close .doc-header-left { padding-left: 68px; }
    .capsule .icon-btn { width: 28px; height: 28px; border-radius: 50%; }
    #darkModeBtn .sun-icon, #darkModeBtn .moon-icon { transition: transform 0.4s; }
    body:not(.dark) #darkModeBtn .moon-icon { display: none; }
    body.dark #darkModeBtn .sun-icon { display: none; }

    /* ============================================================
       回到顶部
       ============================================================ */
    #backToTop { position: fixed; bottom: 28px; right: 28px; z-index: 998; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px var(--shadow-lg); opacity: 0; transform: translateY(20px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
    body.dark #backToTop { color: #0d1117; }
    #backToTop.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #backToTop:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow-lg); }
    #backToTop svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    #backToTop::before { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: conic-gradient(var(--progress-color) var(--scroll-pct, 0%), transparent var(--scroll-pct, 0%)); mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 3px)); -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 3px)); opacity: 0.55; }

    /* ============================================================
       TOC 面板（链接黑色，hover 绿色）
       ============================================================ */
    #toc-panel { position: fixed; right: 16px; top: 80px; z-index: 997; background: var(--toc-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; max-width: 240px; max-height: 60vh; overflow-y: auto; font-size: 0.8rem; box-shadow: 0 8px 24px var(--shadow); transition: opacity 0.3s, transform 0.3s; opacity: 0; transform: translateX(20px); pointer-events: none; }
    #toc-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    #toc-panel .toc-title { font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.5px; }
    #toc-panel a { display: block; padding: 4px 0; color: var(--toc-link); text-decoration: none; border-left: 2px solid transparent; padding-left: 8px; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #toc-panel a:hover,
    #toc-panel a.active { color: var(--toc-link-hover); border-left-color: var(--toc-link-hover); }
    #toc-panel a.toc-h2 { padding-left: 8px; font-weight: 500; }
    #toc-panel a.toc-h3 { padding-left: 18px; font-size: 0.75rem; }
    #toc-panel a.toc-h4 { padding-left: 28px; font-size: 0.72rem; }
    #tocToggleBtn.active { color: var(--heading-color); }

    /* ============================================================
       搜索模态
       ============================================================ */
    .search-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); backdrop-filter: blur(6px); z-index: 10001; display: none; align-items: flex-start; justify-content: center; padding-top: 10vh; }
    .search-modal-overlay.active { display: flex; }
    .search-modal { background: var(--modal-bg); border-radius: 18px; width: 90%; max-width: 580px; box-shadow: 0 18px 45px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; max-height: 70vh; border: 1px solid var(--border); }
    .search-modal-header { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .search-modal-header .search-icon { color: var(--text-muted); margin-right: 10px; flex-shrink: 0; }
    .search-modal-input { flex: 1; border: none; outline: none; font-size: 1.05rem; padding: 8px 0; background: transparent; color: var(--text); }
    .search-modal-input::placeholder { color: var(--text-muted); }
    .search-modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 50%; }
    .search-modal-close:hover { background: var(--btn-hover); color: var(--text); }
    .search-results { overflow-y: auto; flex: 1; padding: 8px 0; }
    .search-result-item { padding: 11px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light); color: var(--text); font-size: 0.88rem; line-height: 1.5; transition: background 0.15s; }
    .search-result-item:hover { background: var(--btn-hover); }
    .search-result-item.selected { background: var(--search-selected); border-left: 3px solid var(--accent); }
    .search-result-item mark { background: var(--search-highlight); border-radius: 2px; color: var(--text); }
    .search-no-results { padding: 28px; text-align: center; color: var(--text-muted); }
    .search-result-title { font-weight: 600; margin-bottom: 3px; }
    .search-hint { padding: 7px 18px; font-size: 0.72rem; color: var(--text-muted); border-bottom: 1px solid var(--border-light); }

    /* ============================================================
       快捷键面板
       ============================================================ */
    #shortcuts-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); backdrop-filter: blur(4px); z-index: 10002; display: none; align-items: center; justify-content: center; }
    #shortcuts-panel.active { display: flex; }
    .shortcuts-modal { background: var(--modal-bg); border-radius: 16px; padding: 24px 28px; max-width: 400px; width: 90%; box-shadow: 0 18px 45px rgba(0,0,0,0.3); border: 1px solid var(--border); }
    .shortcuts-modal h3 { margin: 0 0 14px; font-size: 1.05rem; color: var(--text); }
    .shortcuts-modal .kbd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border-light); font-size: 0.84rem; color: var(--text-secondary); }
    .shortcuts-modal .kbd-row:last-child { border-bottom: none; }
    .shortcuts-modal kbd { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 0.73rem; font-family: 'JetBrains Mono', monospace; color: var(--heading-color); }

    /* ============================================================
       代码块 + 行号 + Prism（暗色彻底优化）
       ============================================================ */
    .code-block-wrapper { margin: 1.6rem 0; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 10px var(--shadow); background: var(--code-bg); border: 1px solid var(--code-border); position: relative; }
    .code-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1.2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--code-border); }
    .code-lang { font-weight: 600; text-transform: uppercase; font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.4px; }
    .code-copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 4px 11px; border-radius: 6px; font-size: 0.73rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .code-copy-btn:hover { background: var(--btn-hover); border-color: var(--accent); color: var(--text); }
    .code-copy-btn.copied { background: #27ae60; border-color: #27ae60; color: #fff; }
    .code-block-wrapper pre { margin: 0; padding: 1.2rem 0; overflow-x: auto; background: transparent !important; display: flex; }
    .code-block-wrapper pre code { font-family: 'JetBrains Mono','Fira Code',Consolas,monospace; font-size: 0.86rem; line-height: 1.7; padding: 0 1.4rem; flex: 1; display: block; color: var(--text) !important; background: transparent !important; }
    .code-line-numbers { flex-shrink: 0; padding: 1.2rem 0; user-select: none; background: var(--line-number-bg); border-right: 1px solid var(--code-border); }

    /* Prism light */

    body.dark .markdown-section .token.regex,body.dark .markdown-section .token.important,body.dark .markdown-section .token.variable{color:#ffa657}

    /* ============================================================
       Markdown 正文样式（标题绿色 + 内联代码 + 表格 + 引用）
       ============================================================ */
    .markdown-section { padding: 72px 28px 40px !important; max-width: 860px; margin: 0 auto; }
    /* ★ 标题绿色 */
    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 { color: var(--heading-color); }
    .markdown-section h1 { font-size: 2rem; font-weight: 700; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-top: 2rem; }
    .markdown-section h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.8rem; }
    .markdown-section h3 { font-size: 1.2rem; font-weight: 600; margin-top: 1.5rem; }
    .markdown-section h4 { font-size: 1.05rem; font-weight: 500; margin-top: 1.2rem; }
    /* 内联代码 */
    .markdown-section code:not(pre code) { background: var(--inline-code-bg); color: var(--inline-code-text); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; font-family: 'JetBrains Mono',monospace; }
    /* 表格 */
    .markdown-section table { border-collapse: collapse; width: 100%; margin: 1.5rem 0; }
    .markdown-section th, .markdown-section td { border: 1px solid var(--table-border); padding: 10px 14px; text-align: left; }
    .markdown-section th { background: var(--bg-secondary); font-weight: 600; }
    .markdown-section tr:nth-child(even) { background: var(--table-stripe); }
    /* 引用 */
    .markdown-section blockquote { border-left: 4px solid var(--blockquote-border); background: var(--blockquote-bg); padding: 12px 18px; margin: 1.2rem 0; border-radius: 0 6px 6px 0; color: var(--text-secondary); }
    .markdown-section blockquote p:last-child { margin-bottom: 0; }
    /* 链接 */
    .markdown-section a { color: var(--heading-color); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
    .markdown-section a:hover { border-bottom-color: var(--heading-color); }

    /* ============================================================
       图片灯箱
       ============================================================ */
    #img-lightbox { position: fixed; inset: 0; z-index: 10050; background: var(--lightbox-bg); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; cursor: zoom-out; animation: lbFadeIn 0.25s ease; }
    #img-lightbox.active { display: flex; }

    #img-lightbox .lb-close:hover { background: rgba(255,255,255,0.2); }
    @keyframes lbFadeIn { from{opacity:0} to{opacity:1} }
    .markdown-section img { cursor: zoom-in; border-radius: 6px; transition: transform 0.15s; }
    .markdown-section img:hover { transform: scale(1.02); }

    /* ============================================================
       响应式
       ============================================================ */
    @media (max-width: 768px) {
      .sidebar { width: 100% !important; }
      .doc-header { left: 0 !important; }
      .markdown-section { padding: 72px 16px 40px !important; }

    }

  <div id="app"></div>

  <!-- ========== localStorage 容错 ========== -->
  <script>
    (function(){var m={};function b(){try{var k='__t__';localStorage.setItem(k,'1');localStorage.removeItem(k);return false}catch(e){return true}}if(!b())return;var s=Storage.prototype.setItem,g=Storage.prototype.getItem,r=Storage.prototype.removeItem,c=Storage.prototype.clear;Storage.prototype.setItem=function(k,v){try{s.call(this,k,v)}catch(e){m[k]=String(v)}};Storage.prototype.getItem=function(k){try{return g.call(this,k)}catch(e){return k in m?m[k]:null}};Storage.prototype.removeItem=function(k){try{r.call(this,k)}catch(e){delete m[k]}};Storage.prototype.clear=function(){try{c.call(this)}catch(e){m={}}}})();
  </script>

  <script>
    var DOCSIFY_BASE_PATH = '/my-docs/';
    window.$docsify = {
      name: 'Soren的知识库', loadSidebar: '_sidebar.md', subMaxLevel: 0,
      basePath: DOCSIFY_BASE_PATH, homepage: 'README.md', notFoundPage: true,
      plugins: [function(hook, vm) {
        hook.ready(function() {
          hideLoading(); injectSidebarHeader(); bindGlobalEvents();
          initLightbox(); initImageClickHandler();
          document.body.classList.remove('close');
          updateDocTitle(); updateReadingTime();
          setTimeout(function() { initSidebarFolders(); generateTOC(); updateProgressBar(); addHeadingAnchors(); restoreReadingPosition(); addLineNumbers(); }, 250);
        });
        hook.doneEach(function() {
          // ★ 统一冻结（一次冻结覆盖全部 DOM 操作）
          var nav = document.querySelector('.sidebar-nav');
          if (nav) nav.classList.add('no-transition');

          saveReadingPosition(); updateDocTitle(); updateReadingTime();
          closeSearchModal(); enhanceCodeBlocks(); clearTOC();
          resetSidebarStateQuiet();

          setTimeout(function() {
            initSidebarFoldersQuiet(); generateTOC(); updateProgressBar();
            addHeadingAnchors(); addLineNumbers(); initImageClickHandler();
            // ★ 全部 DOM 操作完成后统一解冻
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                if (nav) nav.classList.remove('no-transition');
              });
            });
            setTimeout(restoreReadingPosition, 300);
          }, 150);
          if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise();
        });
      }]
    };

    // ========== Toast ==========
    function showToast(msg, type) { type=type||'info'; var c=document.getElementById('toast-container'); if(!c)return; var t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; c.appendChild(t); setTimeout(function(){if(t.parentNode)t.remove();},2400); }

    // ========== 加载三角形 ==========
    (function(){var wrapper=document.getElementById('loaderWrapper'),triangle=document.getElementById('loaderTriangle'); if(!wrapper||!triangle)return; var maxAngle=9,baseShadow='drop-shadow(0 0 4px rgba(0,0,0,0.15)) drop-shadow(0 0 1px rgba(0,0,0,0.3))'; function h(e){if(_loaded)return; var dx=(e.clientX-window.innerWidth/2)/(window.innerWidth/2),dy=(e.clientY-window.innerHeight/2)/(window.innerHeight/2); wrapper.style.transform='rotateX('+(-dy*maxAngle)+'deg) rotateY('+(dx*maxAngle)+'deg) translateZ(14px)'; triangle.style.filter=baseShadow+' drop-shadow('+(dx*10)+'px '+(dy*10)+'px 12px rgba(0,0,0,0.35))'; } document.addEventListener('mousemove',h); window._loaderMouse=h; })();

    var _loaded=false;
    function hideLoading(){if(_loaded)return;_loaded=true; var el=document.getElementById('loading'),dh=document.getElementById('docHeader'); if(el){el.classList.add('fade-out');setTimeout(function(){if(el)el.style.display='none';},450);} if(dh)dh.style.display='flex'; if(window._loaderMouse){document.removeEventListener('mousemove',window._loaderMouse);window._loaderMouse=null;}}
    setTimeout(function(){if(!_loaded){var e=document.getElementById('loadingError');if(e)e.classList.add('show');}},5000);

    // ========== 侧边栏头部 ==========
    function injectSidebarHeader(){var sb=document.querySelector('.sidebar');if(!sb||sb.querySelector('.sidebar-header'))return;var nav=sb.querySelector('.sidebar-nav');if(!nav)return;var h=document.createElement('div');h.className='sidebar-header';h.innerHTML='<span class="sidebar-brand" id="sidebarBrand">📚 知识库总览</span><input type="text" class="sidebar-filter-input" id="sidebarFilterInput" placeholder="过滤…"><div class="sidebar-actions"><button class="icon-btn" id="sidebarSearchBtn" title="过滤"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button><button class="icon-btn" id="sidebarCloseBtn" title="关闭"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button></div>';sb.insertBefore(h,nav);bindSidebarButtons();}
    function bindSidebarButtons(){var closeBtn=document.getElementById('sidebarCloseBtn'),searchBtn=document.getElementById('sidebarSearchBtn'),fi=document.getElementById('sidebarFilterInput'),brand=document.getElementById('sidebarBrand');if(closeBtn)closeBtn.addEventListener('click',function(){document.body.classList.add('close');});if(searchBtn&&fi&&brand){searchBtn.addEventListener('click',function(){if(fi.classList.contains('show')){fi.classList.remove('show');brand.classList.remove('hidden');fi.value='';filterSidebarItems('');}else{fi.classList.add('show');brand.classList.add('hidden');fi.focus();}});}if(fi){fi.addEventListener('input',function(){filterSidebarItems(this.value);});fi.addEventListener('keydown',function(e){if(e.key==='Escape'){this.value='';filterSidebarItems('');this.classList.remove('show');if(brand)brand.classList.remove('hidden');}});}}

    // ========== 全局事件 ==========
    function bindGlobalEvents(){
      var cb1=document.getElementById('capsuleSidebarBtn'),cb2=document.getElementById('capsuleSearchBtn');if(cb1)cb1.addEventListener('click',function(){document.body.classList.remove('close');});if(cb2)cb2.addEventListener('click',openSearchModal);
      var dm=document.getElementById('darkModeBtn');if(dm){dm.addEventListener('click',toggleDarkMode);if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark');}
      var tocBtn=document.getElementById('tocToggleBtn'),tocPanel=document.getElementById('toc-panel');if(tocBtn&&tocPanel)tocBtn.addEventListener('click',function(){tocPanel.classList.toggle('visible');tocBtn.classList.toggle('active');});
      var btt=document.getElementById('backToTop');if(btt)btt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
      window.addEventListener('scroll',function(){updateProgressBar();if(btt){btt.classList.toggle('visible',window.scrollY>400);var dh=document.documentElement.scrollHeight-window.innerHeight;btt.style.setProperty('--scroll-pct',dh>0?Math.min(100,Math.round((window.scrollY/dh)*100))+'%':'0%');}updateTOCHighlight();});
      var scrollTimer;window.addEventListener('scroll',function(){clearTimeout(scrollTimer);scrollTimer=setTimeout(saveReadingPosition,500);});
      var closeBtn=document.getElementById('searchModalClose'),overlay=document.getElementById('searchModalOverlay');if(closeBtn)closeBtn.addEventListener('click',closeSearchModal);if(overlay)overlay.addEventListener('click',function(e){if(e.target===overlay)closeSearchModal();});
      var si=document.getElementById('searchModalInput');if(si){si.addEventListener('input',function(){highlightInDocument(this.value);generateSearchResults(this.value);_searchSelectedIdx=-1;});si.addEventListener('keydown',handleSearchKeyboard);}
      document.addEventListener('keydown',handleGlobalShortcuts);
    }

    function toggleDarkMode(){document.body.classList.toggle('dark');localStorage.setItem('darkMode',document.body.classList.contains('dark'));}
    function handleGlobalShortcuts(e){var tag=(e.target.tagName||'').toLowerCase(),isInput=tag==='input'||tag==='textarea'||e.target.isContentEditable;if(e.key==='Escape'){closeSearchModal();closeShortcutsPanel();var tp=document.getElementById('toc-panel');if(tp)tp.classList.remove('visible');var tb=document.getElementById('tocToggleBtn');if(tb)tb.classList.remove('active');}if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearchModal();return;}if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();document.body.classList.toggle('close');return;}if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();toggleDarkMode();return;}if((e.ctrlKey||e.metaKey)&&e.key==='ArrowUp'){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});return;}if(e.key==='/'&&!isInput){e.preventDefault();openSearchModal();return;}if(e.key==='?'&&!isInput){e.preventDefault();openShortcutsPanel();return;}}
    function openShortcutsPanel(){var p=document.getElementById('shortcuts-panel');if(p)p.classList.add('active');}
    function closeShortcutsPanel(){var p=document.getElementById('shortcuts-panel');if(p)p.classList.remove('active');}

    // ========== 搜索键盘导航 ==========
    var _searchSelectedIdx=-1;
    function handleSearchKeyboard(e){var items=document.querySelectorAll('.search-result-item');if(!items.length)return;if(e.key==='ArrowDown'){e.preventDefault();_searchSelectedIdx=Math.min(_searchSelectedIdx+1,items.length-1);updateSearchSelection(items);}else if(e.key==='ArrowUp'){e.preventDefault();_searchSelectedIdx=Math.max(_searchSelectedIdx-1,0);updateSearchSelection(items);}else if(e.key==='Enter'){e.preventDefault();if(_searchSelectedIdx>=0&&items[_searchSelectedIdx])items[_searchSelectedIdx].click();}}
    function updateSearchSelection(items){items.forEach(function(item,i){item.classList.toggle('selected',i===_searchSelectedIdx);if(i===_searchSelectedIdx)item.scrollIntoView({block:'nearest'});});}

    // ========== 进度条 ==========
    function updateProgressBar(){var bar=document.getElementById('reading-progress');if(!bar)return;var dh=document.documentElement.scrollHeight-window.innerHeight;bar.style.width=dh<=0?'0%':Math.min(100,Math.max(0,(window.scrollY/dh)*100))+'%';}
    function updateReadingTime(){var el=document.getElementById('readingTime');if(!el)return;var c=document.querySelector('.markdown-section');if(!c){el.textContent='';return;}var text=c.textContent||'',words=text.replace(/\s+/g,' ').trim().split(/\s+/).length,chinese=(text.match(/[\u4e00-\u9fff]/g)||[]).length;el.textContent='⏱ ~'+Math.max(1,Math.ceil((words/200)+(chinese/400)))+' min';}

    // ========== 标题锚点 ==========
